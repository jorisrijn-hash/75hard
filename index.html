<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>75 Dagen</title>

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="75 Dagen">

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">

<style>
  :root {
    --bg: #000000;
    --fill: #1c1c1e;
    --fill-2: #2c2c2e;
    --sep: rgba(255, 255, 255, 0.09);
    --ink: #ffffff;
    --muted: #98989f;

    --move: #ff375f;
    --eat: #30d158;
    --mind: #64d2ff;
    --rest: #bf5af2;
    --orange: #ff9f0a;
    --fail: #ff453a;

    --r: 22px;
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
    --tabbar: 64px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  body {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px calc(var(--tabbar) + 36px + env(safe-area-inset-bottom));
  }
  h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -0.02em; }
  button { font-family: var(--sans); }

  /* splash */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(120% 90% at 50% 10%, #16181d 0%, #000 70%);
    display: grid; place-items: center;
    transition: opacity 0.45s var(--ease), transform 0.45s var(--ease);
  }
  #splash.out { opacity: 0; transform: scale(1.1); pointer-events: none; }
  #splash svg { width: 124px; height: 124px; transform: rotate(-90deg); }
  #splash circle { fill: none; stroke-width: 12; stroke-linecap: round; }
  #splash .r1 { stroke: var(--move); stroke-dasharray: 327; stroke-dashoffset: 327; animation: f1 1.2s var(--ease) forwards; }
  #splash .r2 { stroke: var(--eat);  stroke-dasharray: 251; stroke-dashoffset: 251; animation: f2 1.2s var(--ease) 0.12s forwards; }
  #splash .r3 { stroke: var(--mind); stroke-dasharray: 176; stroke-dashoffset: 176; animation: f3 1.2s var(--ease) 0.24s forwards; }
  @keyframes f1 { to { stroke-dashoffset: 26; } }
  @keyframes f2 { to { stroke-dashoffset: 20; } }
  @keyframes f3 { to { stroke-dashoffset: 14; } }
  .splash-label {
    position: absolute; bottom: 25%;
    font-size: 12px; color: var(--muted);
    letter-spacing: 0.18em; text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.85; } }

  /* header */
  header {
    position: sticky; top: 0; z-index: 20;
    padding: calc(env(safe-area-inset-top) + 10px) 0 8px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    display: flex; align-items: flex-end; justify-content: space-between;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s linear;
  }
  header.scrolled { border-bottom-color: var(--sep); }
  header h1 { font-size: 32px; letter-spacing: -0.03em; }
  header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .gear {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--fill); border: 0; color: var(--muted);
    display: grid; place-items: center; cursor: pointer;
    transition: transform 0.3s var(--spring);
  }
  .gear:active { transform: scale(0.86); }
  .gear[disabled] { opacity: 0.3; }

  /* widgets */
  main { padding-top: 16px; }
  .view.animate { animation: viewIn 0.4s var(--ease) both; }
  @keyframes viewIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .w {
    background: var(--fill);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 12px;
  }
  /* Alleen bij een view wissel animeren de kaarten in. Bij het afvinken van een
     habit rendert dezelfde view opnieuw, en dan zou pop het scherm zwart flitsen. */
  .view.animate > .w,
  .view.animate > .grid > .tile,
  .view.animate > .rings-wrap { animation: pop 0.42s var(--ease) both; }
  .view.animate > *:nth-child(1) { animation-delay: 0.02s; }
  .view.animate > *:nth-child(2) { animation-delay: 0.06s; }
  .view.animate > *:nth-child(3) { animation-delay: 0.10s; }
  .view.animate > *:nth-child(4) { animation-delay: 0.14s; }
  .view.animate > *:nth-child(5) { animation-delay: 0.18s; }
  .view.animate > *:nth-child(6) { animation-delay: 0.22s; }
  .view.animate > *:nth-child(7) { animation-delay: 0.26s; }
  @keyframes pop { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: none; } }

  .w-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .w-head .ic { width: 20px; height: 20px; flex: 0 0 auto; }
  .w-head .ic svg { width: 20px; height: 20px; display: block; }
  .w-head .t { font-size: 15px; font-weight: 700; }
  .w-head .r { margin-left: auto; font-size: 13px; color: var(--muted); font-family: var(--mono); }

  /* rings */
  .rings-wrap { perspective: 900px; margin-bottom: 12px; }
  .rings {
    background: linear-gradient(165deg, #202228 0%, #121316 100%);
    border-radius: 26px;
    padding: 22px 20px;
    transform-style: preserve-3d;
    transition: transform 0.6s var(--ease);
    box-shadow: 0 22px 50px rgba(0, 0, 0, 0.65);
    position: relative; overflow: hidden;
    touch-action: none; /* anders scrollt je vinger de pagina in plaats van de kaart te kantelen */
    cursor: grab;
  }
  .rings::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(55% 55% at var(--gx, 60%) var(--gy, 20%), rgba(255,255,255,0.10), transparent 70%);
  }
  /* Aparte laag voor de idle beweging, zodat die niet vecht met de sleep transform */
  .rings-inner {
    display: flex; align-items: center; gap: 16px;
    transform-style: preserve-3d;
    animation: breathe 8s ease-in-out infinite;
  }
  .rings.grabbed .rings-inner { animation-play-state: paused; }
  @keyframes breathe {
    0%, 100% { transform: rotateY(-7deg) rotateX(3deg); }
    50%      { transform: rotateY(7deg) rotateX(-3deg); }
  }
  .rings svg { width: 140px; height: 140px; flex: 0 0 auto; transform: rotate(-90deg) translateZ(45px); }
  .rings circle { fill: none; stroke-width: 13; stroke-linecap: round; }
  .rings .track { opacity: 0.18; }
  .rings .val { transition: stroke-dashoffset 1s var(--ease); }
  .rings .m { stroke: var(--move); }
  .rings .e { stroke: var(--eat); }
  .rings .i { stroke: var(--mind); }
  .rings .val.m { filter: drop-shadow(0 0 5px rgba(255,55,95,0.55)); }
  .rings .val.e { filter: drop-shadow(0 0 5px rgba(48,209,88,0.5)); }
  .rings .val.i { filter: drop-shadow(0 0 5px rgba(100,210,255,0.5)); }

  .legend { flex: 1; min-width: 0; transform: translateZ(22px); }
  .legend .lg { margin-bottom: 12px; }
  .legend .lg:last-child { margin-bottom: 0; }
  .legend .name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); }
  .legend .num { font-family: var(--mono); font-size: 21px; font-weight: 700; letter-spacing: -0.02em; }
  .legend .num small { font-size: 12px; color: var(--muted); font-weight: 400; }
  .legend .m .num { color: var(--move); }
  .legend .e .num { color: var(--eat); }
  .legend .i .num { color: var(--mind); }

  /* tiles */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; perspective: 800px; }
  .tile {
    background: var(--fill); border-radius: var(--r); padding: 14px;
    animation: pop 0.42s var(--ease) both;
    transition: transform 0.3s var(--spring);
  }
  .tile:active { transform: rotateX(8deg) scale(0.95); }
  .tile .lbl { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; margin-bottom: 10px; }
  .tile .lbl svg { width: 15px; height: 15px; }
  .tile .v { font-family: var(--mono); font-size: 30px; font-weight: 700; letter-spacing: -0.035em; line-height: 1; }
  .tile .v small { font-size: 14px; color: var(--muted); font-weight: 400; letter-spacing: 0; }
  .tile .c { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .tile .mini { margin-top: 10px; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .tile .mini > i { display: block; height: 100%; border-radius: 999px; transition: width 0.9s var(--ease); }

  /* rows */
  .list { margin: 0 -16px -16px; }
  .row {
    display: flex; align-items: center; gap: 12px;
    width: 100%; min-height: 52px; padding: 9px 16px;
    background: none; border: 0; border-top: 1px solid var(--sep);
    color: var(--ink); font-size: 16px; text-align: left; cursor: pointer;
    perspective: 600px; /* geeft de checkbox flip echte diepte */
    transition: background-color 0.15s linear, transform 0.25s var(--spring);
  }
  .row:last-child { border-radius: 0 0 var(--r) var(--r); }
  .row:active { background: var(--fill-2); transform: scale(0.985); }

  .box {
    flex: 0 0 auto; width: 26px; height: 26px;
    border-radius: 50%; border: 2px solid #4a4a4e;
    display: grid; place-items: center;
    transform-style: preserve-3d;
    transition: transform 0.5s var(--spring), background-color 0.3s var(--ease), border-color 0.3s var(--ease);
  }
  .box svg { width: 14px; height: 14px; opacity: 0; transform: scale(0.4); transition: opacity 0.2s var(--ease), transform 0.4s var(--spring); }
  [aria-pressed="true"] .box, .box.on { border-color: transparent; transform: rotateY(360deg) scale(1.08); }
  [aria-pressed="true"] .box svg, .box.on svg { opacity: 1; transform: scale(1); }

  .txt { flex: 1; min-width: 0; font-size: 15px; }
  .txt .hint { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
  [aria-pressed="true"] .txt > span:first-child { color: var(--muted); }
  .tag { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .row.locked { cursor: default; }
  .row.locked:active { transform: none; background: none; }

  .row.counter { cursor: default; }
  .row.counter:active { transform: none; background: none; }
  .stepper { flex: 0 0 auto; display: flex; gap: 6px; }
  .stepper .st {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--fill-2); border: 0; color: var(--ink);
    font-size: 20px; font-weight: 600; line-height: 1;
    display: grid; place-items: center; cursor: pointer;
    transition: transform 0.25s var(--spring);
  }
  .stepper .st:active { transform: scale(0.82); }

  /* board */
  .board-wrap { perspective: 620px; }
  .board {
    display: grid; grid-template-columns: repeat(15, 1fr); gap: 5px;
    transform: rotateX(22deg); transform-style: preserve-3d;
    margin: 6px 0 16px;
  }
  .cell {
    aspect-ratio: 1; border-radius: 4px;
    background: #2c2c2e; border: 1px solid transparent;
    padding: 0; position: relative; overflow: hidden; cursor: pointer;
    transition: transform 0.35s var(--spring);
  }
  .cell > i {
    position: absolute; left: 0; right: 0; bottom: 0; height: 0;
    background: rgba(255, 55, 95, 0.45);
    transition: height 0.7s var(--ease);
  }
  .cell.perfect {
    background: linear-gradient(160deg, var(--move), #ff6b8a);
    transform: translateZ(8px);
    box-shadow: 0 6px 10px rgba(0, 0, 0, 0.55);
  }
  .cell.miss { border-color: rgba(255, 69, 58, 0.4); }
  .cell.today { border-color: #fff; transform: translateZ(22px) scale(1.14); box-shadow: 0 10px 16px rgba(0,0,0,0.6); }
  .cell.future { background: #161618; }
  .cell:active { transform: scale(0.85); }

  /* charts */
  .trend { width: 100%; height: 92px; display: block; }
  .trend rect { fill: rgba(255, 55, 95, 0.35); }
  .trend rect.perfect { fill: var(--move); }
  .trend text { fill: var(--muted); font-family: var(--mono); font-size: 7px; }

  .spark { width: 100%; height: 74px; display: block; }
  .spark polyline { fill: none; stroke: var(--orange); stroke-width: 2.2; stroke-linejoin: round; stroke-linecap: round; }
  .spark circle { fill: var(--orange); }
  .spark text { fill: var(--muted); font-family: var(--mono); font-size: 8px; }

  .bar-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-top: 1px solid var(--sep); }
  .bar-row:first-of-type { border-top: 0; }
  .bar-row .n { flex: 1; font-size: 14px; }
  .bar-row .b { flex: 0 0 76px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .bar-row .b > i { display: block; height: 100%; border-radius: 999px; transition: width 0.9s var(--ease); }
  .bar-row .p { flex: 0 0 40px; text-align: right; font-family: var(--mono); font-size: 13px; color: var(--muted); }

  .callout { margin-top: 14px; padding: 12px 14px; border-radius: 14px; background: rgba(255,69,58,0.12); font-size: 13px; line-height: 1.5; }
  .callout.good { background: rgba(100,210,255,0.12); }
  .empty { color: var(--muted); font-size: 13px; line-height: 1.5; margin: 0; }

  /* training */
  .ex { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-top: 1px solid var(--sep); perspective: 600px; }
  .ex-check { background: none; border: 0; padding: 3px; cursor: pointer; display: grid; place-items: center; }
  .ex-check[aria-pressed="true"] .box { background: linear-gradient(150deg, var(--move), #ff6b8a); }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name { font-size: 15px; display: block; }
  .ex.done .ex-name { color: var(--muted); }
  .ex .hint { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .logbox { flex: 0 0 auto; display: flex; gap: 6px; }
  .kg {
    flex: 0 0 auto; width: 60px; height: 40px;
    background: var(--fill-2); border: 0; border-radius: 10px;
    color: var(--ink); font-family: var(--mono); font-size: 16px; text-align: center;
  }
  .kg.reps { width: 54px; }
  .kg:focus { outline: 2px solid var(--move); }

  .rec { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-top: 1px solid var(--sep); }
  .rec:first-of-type { border-top: 0; }
  .rec .n { flex: 1; font-size: 14px; }
  .rec .n .hint { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .rec.stale .n .hint { color: var(--fail); }
  .rec .pr { font-family: var(--mono); font-size: 19px; font-weight: 700; color: var(--move); }
  .rec .pr small { font-size: 11px; color: var(--muted); font-weight: 400; }

  .rule { display: flex; gap: 12px; padding: 10px 0; border-top: 1px solid var(--sep); font-size: 15px; line-height: 1.4; }
  .rule:first-of-type { border-top: 0; }
  .rule .dot { flex: 0 0 auto; width: 6px; height: 6px; border-radius: 50%; background: var(--mind); margin-top: 8px; }
  .prog-day { padding: 12px 0; border-top: 1px solid var(--sep); }
  .prog-day:first-of-type { border-top: 0; }
  .prog-day h3 { font-size: 15px; margin-bottom: 5px; }
  .prog-day p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.6; }

  /* tab bar */
  nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
    height: calc(var(--tabbar) + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    background: rgba(18, 18, 20, 0.86);
    backdrop-filter: saturate(180%) blur(22px);
    -webkit-backdrop-filter: saturate(180%) blur(22px);
    border-top: 1px solid var(--sep);
  }
  nav button {
    flex: 1; background: none; border: 0; color: var(--muted);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    font-size: 10px; font-weight: 600; cursor: pointer;
    transition: color 0.2s linear;
  }
  nav button svg { width: 22px; height: 22px; transition: transform 0.4s var(--spring); }
  nav button.on { color: var(--move); }
  nav button.on svg { transform: translateY(-2px) scale(1.1); }
  nav button:active svg { transform: scale(0.85); }

  /* timer */
  #timer {
    position: fixed; right: 14px;
    bottom: calc(var(--tabbar) + 14px + env(safe-area-inset-bottom));
    z-index: 45; display: flex; gap: 6px;
  }
  #timer.hidden { display: none; }
  #timer .pill {
    height: 46px; padding: 0 16px; border-radius: 999px;
    background: rgba(44, 44, 46, 0.92);
    backdrop-filter: blur(14px);
    border: 0; color: var(--ink);
    font-family: var(--mono); font-size: 14px; cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    transition: transform 0.3s var(--spring);
    animation: pop 0.35s var(--ease) both;
  }
  #timer .pill:active { transform: scale(0.9); }
  #timer .pill.sug { color: var(--move); }
  #timer.running .pill { background: linear-gradient(150deg, var(--move), #ff6b8a); color: #fff; font-weight: 700; }
  #timer.ding .pill { animation: shake 0.45s var(--ease) 2; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

  /* sheet */
  .backdrop {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    display: flex; align-items: flex-end;
    animation: fade 0.3s var(--ease);
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .sheet {
    width: 100%; max-width: 560px; margin: 0 auto;
    background: #1c1c1e; border-radius: 24px 24px 0 0;
    padding: 10px 18px calc(26px + env(safe-area-inset-bottom));
    animation: up 0.45s var(--spring);
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes up { from { transform: translateY(100%); } to { transform: none; } }
  .grabber { width: 36px; height: 5px; border-radius: 999px; background: #48484a; margin: 0 auto 16px; }
  .sheet h2 { font-size: 22px; margin-bottom: 6px; }
  .sheet p { color: var(--muted); font-size: 13px; line-height: 1.5; margin: 0 0 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  input[type="number"], input[type="date"] {
    width: 100%; height: 48px; padding: 0 14px;
    background: var(--fill-2); border: 0; border-radius: 12px;
    color: var(--ink); font-family: var(--mono); font-size: 16px;
  }
  input:focus { outline: 2px solid var(--move); }
  .btn {
    width: 100%; height: 50px; border: 0; border-radius: 14px;
    background: linear-gradient(150deg, var(--move), #ff6b8a);
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
    transition: transform 0.25s var(--spring); margin-top: 8px;
  }
  .btn:active { transform: scale(0.96); }
  .btn.ghost { background: var(--fill-2); color: var(--ink); }
  .btn.danger { background: rgba(255,69,58,0.14); color: var(--fail); }
  .switch { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-top: 1px solid var(--sep); }
  .toggle {
    width: 51px; height: 31px; border-radius: 999px; background: #39393d;
    border: 0; position: relative; cursor: pointer;
    transition: background-color 0.3s var(--ease);
  }
  .toggle::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 27px; height: 27px; border-radius: 50%; background: #fff;
    transition: transform 0.35s var(--spring);
  }
  .toggle.on { background: var(--eat); }
  .toggle.on::after { transform: translateX(20px); }

  /* toast en confetti */
  #toast {
    position: fixed; left: 50%; top: calc(env(safe-area-inset-top) + 12px);
    transform: translate(-50%, -160%);
    z-index: 80;
    background: rgba(44, 44, 46, 0.96);
    backdrop-filter: blur(16px);
    border-radius: 999px; padding: 11px 18px;
    font-size: 14px; font-weight: 600; white-space: nowrap;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    transition: transform 0.55s var(--spring);
  }
  #toast.show { transform: translate(-50%, 0); }
  #confetti { position: fixed; inset: 0; z-index: 70; pointer-events: none; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div id="splash">
  <svg viewBox="0 0 140 140">
    <circle class="r1" cx="70" cy="70" r="52"/>
    <circle class="r2" cx="70" cy="70" r="40"/>

  /* ---------- geluid ---------- */
  var sfx = (function () {
    var ctx = null;
    function ready() {
      if (state && state.meta && state.meta.sound === false) return false;
      if (!ctx) {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return false;
        try { ctx = new AC(); } catch (e) { return false; }
      }
      if (ctx.state === "suspended") ctx.resume();
      return true;
    }
    function tone(freq, start, dur, vol, type) {
      var osc = ctx.createOscillator(), gain = ctx.createGain(), t = ctx.currentTime + start;
      osc.type = type || "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(vol, t + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + dur + 0.02);
    }
    return {
      unlock:  function () { ready(); },
      tick:    function () { if (ready()) { tone(880, 0, 0.09, 0.07); tone(1320, 0.01, 0.06, 0.03); } },
      untick:  function () { if (ready()) tone(320, 0, 0.1, 0.05, "triangle"); },
      tab:     function () { if (ready()) tone(600, 0, 0.05, 0.03); },
      done:    function () { if (ready()) [523, 659, 784].forEach(function (f, i) { tone(f, i * 0.07, 0.22, 0.06); }); },
      ring:    function () { if (ready()) [659, 880, 1174].forEach(function (f, i) { tone(f, i * 0.06, 0.3, 0.06, "triangle"); }); },
      perfect: function () { if (ready()) [523, 659, 784, 1046].forEach(function (f, i) { tone(f, i * 0.09, 0.5, 0.07, "triangle"); }); },
      beep:    function () { if (ready()) [0, 0.2, 0.4].forEach(function (s) { tone(1046, s, 0.14, 0.09, "square"); }); }
    };
  })();

  /* ---------- opslag ---------- */
  var memory = {};
  var storageOk = (function () {
    try { localStorage.setItem("__t", "1"); localStorage.removeItem("__t"); return true; }
    catch (e) { return false; }
  })();

  function load() {
    try {
      var raw = storageOk ? localStorage.getItem(STORE_KEY) : memory[STORE_KEY];
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  function save() {
    var payload;
    try { payload = JSON.stringify(state); } catch (e) { return; }
    if (!storageOk) { memory[STORE_KEY] = payload; return; }
    try { localStorage.setItem(STORE_KEY, payload); }
    catch (e) { toast("Opslaan mislukt, opslag vol"); }
  }

  /* ---------- foto opslag, IndexedDB ---------- */
  var photoDB = (function () {
    var dbp = null;
    function open() {
      if (dbp) return dbp;
      dbp = new Promise(function (resolve, reject) {
        if (!window.indexedDB) { reject(new Error("geen indexedDB")); return; }
        var req = indexedDB.open("challenge75-photos", 1);
        req.onupgradeneeded = function () {
          var db = req.result;
          if (!db.objectStoreNames.contains("photos")) db.createObjectStore("photos");
        };
        req.onsuccess = function () { resolve(req.result); };
        req.onerror = function () { reject(req.error); };
      });
      return dbp;
    }
    function tx(mode) { return open().then(function (db) { return db.transaction("photos", mode).objectStore("photos"); }); }
    return {
      put: function (k, blob) {
        return tx("readwrite").then(function (store) {
          return new Promise(function (res, rej) {
            var r = store.put(blob, k); r.onsuccess = res; r.onerror = function () { rej(r.error); };
          });
        });
      },
      get: function (k) {
        return tx("readonly").then(function (store) {
          return new Promise(function (res, rej) {
            var r = store.get(k); r.onsuccess = function () { res(r.result || null); }; r.onerror = function () { rej(r.error); };
          });
        });
      },
      del: function (k) {
        return tx("readwrite").then(function (store) {
          return new Promise(function (res, rej) {
            var r = store.delete(k); r.onsuccess = res; r.onerror = function () { rej(r.error); };
          });
        });
      },
      keys: function () {
        return tx("readonly").then(function (store) {
          return new Promise(function (res, rej) {
            var r = store.getAllKeys(); r.onsuccess = function () { res(r.result || []); }; r.onerror = function () { rej(r.error); };
          });
        });
      }
    };
  })();

  /* Verkleint een foto naar max 1080px breed en comprimeert als jpeg, scheelt enorm in opslag */
  function shrinkImage(file) {
    return new Promise(function (resolve, reject) {
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function () {
        URL.revokeObjectURL(url);
        var max = 1080;
        var scale = Math.min(1, max / Math.max(img.width, img.height));
        var w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        var cv = document.createElement("canvas");
        cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(img, 0, 0, w, h);
        cv.toBlob(function (blob) { blob ? resolve(blob) : reject(new Error("blob faalt")); }, "image/jpeg", 0.82);
      };
      img.onerror = function () { URL.revokeObjectURL(url); reject(new Error("kan afbeelding niet laden")); };
      img.src = url;
    });
  }

  /* ---------- datum ---------- */
  function key(d) {
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function parseKey(k) { var p = k.split("-").map(Number); return new Date(p[0], p[1] - 1, p[2]); }
  function addDays(d, n) { var c = new Date(d.getFullYear(), d.getMonth(), d.getDate()); c.setDate(c.getDate() + n); return c; }
  function diffDays(a, b) { return Math.round((parseKey(key(b)) - parseKey(key(a))) / 86400000); }
  function isSunday(d) { return d.getDay() === 0; }

  var DAYS = ["zondag", "maandag", "dinsdag", "woensdag", "donderdag", "vrijdag", "zaterdag"];
  var MONTHS = ["januari", "februari", "maart", "april", "mei", "juni", "juli", "augustus", "september", "oktober", "november", "december"];
  function longLabel(d) { return DAYS[d.getDay()] + " " + d.getDate() + " " + MONTHS[d.getMonth()]; }
  function nl(n, dec) { return n.toFixed(dec === undefined ? 1 : dec).replace(".", ","); }

  /* ---------- state ---------- */
  var state = null;
  var viewDate = new Date();
  var tab = "today";
  var lastRings = null;

  function defaultState() {
    return { config: { startDate: key(new Date()), bodyweight: null }, days: {}, weeks: {}, meta: { sound: true } };
  }
  function dayRecord(k) {
    if (!state.days[k]) state.days[k] = { habits: {}, workout: {}, counts: {} };
    if (!state.days[k].habits) state.days[k].habits = {};
    if (!state.days[k].workout) state.days[k].workout = {};
    if (!state.days[k].counts) state.days[k].counts = {};
    return state.days[k];
  }
  function requiredHabits(d) {
    return HABITS.filter(function (h) { return !(h.restExempt && isSunday(d)); });
  }

  /* Tellerwaarde voor een habit op een dag, uit rec.counts */
  function counterValue(d, id) {
    var rec = state.days[key(d)];
    return rec && rec.counts && typeof rec.counts[id] === "number" ? rec.counts[id] : 0;
  }
  /* Een habit is 'gehaald' als het vinkje aan staat OF de teller het doel raakt */
  function habitDone(d, h) {
    var rec = state.days[key(d)];
    if (!rec) return false;
    if (h.counter) return counterValue(d, h.id) >= h.counter.target || !!rec.habits[h.id];
    return !!rec.habits[h.id];
  }
  function completionFor(d) {
    var req = requiredHabits(d);
    var done = req.filter(function (h) { return habitDone(d, h); }).length;
    return { done: done, total: req.length, pct: req.length ? done / req.length : 0 };
  }
  function ringData(d) {
    var rec = state.days[key(d)];
    return RINGS.map(function (r) {
      var items = requiredHabits(d).filter(function (h) { return r.groups.indexOf(h.group) >= 0; });
      var done = items.filter(function (h) { return habitDone(d, h); }).length;
      return { id: r.id, name: r.name, done: done, total: items.length, pct: items.length ? done / items.length : 0 };
    });
  }
  function startDate() { return parseKey(state.config.startDate); }
  function dayIndex(d) { return diffDays(startDate(), d) + 1; }
  function elapsedDays() { return Math.max(0, Math.min(TOTAL_DAYS, dayIndex(new Date()))); }

  function stats() {
    var idx = dayIndex(new Date());
    var elapsed = elapsedDays();
    var doneSum = 0, reqSum = 0, perfect = 0, missed = 0, i, c;

    for (i = 1; i <= elapsed; i++) {
      c = completionFor(addDays(startDate(), i - 1));
      doneSum += c.done; reqSum += c.total;
      if (c.total > 0 && c.done === c.total) perfect++;
      else if (i < idx) missed++;
    }

    var streak = 0, cursor = elapsed;
    if (cursor >= 1) {
      var t = completionFor(addDays(startDate(), cursor - 1));
      if (t.done < t.total) cursor--;
    }
    while (cursor >= 1) {
      c = completionFor(addDays(startDate(), cursor - 1));
      if (c.total > 0 && c.done === c.total) { streak++; cursor--; } else break;
    }

    var rates = HABITS.map(function (h) {
      var done = 0, total = 0, day, rec;
      for (var j = 1; j <= elapsed; j++) {
        day = addDays(startDate(), j - 1);
        if (h.restExempt && isSunday(day)) continue;
        total++;
        if (habitDone(day, h)) done++;
      }
      return { label: h.label, group: h.group, pct: total ? done / total : 0 };
    });

    return {
      idx: idx, elapsed: elapsed,
      remaining: Math.max(0, TOTAL_DAYS - Math.max(0, idx)),
      overall: reqSum ? doneSum / reqSum : 0,
      perfect: perfect, missed: missed, streak: streak, rates: rates,
      notStarted: idx < 1
    };
  }

  function weekCounts(d) {
    var dow = d.getDay() === 0 ? 7 : d.getDay();
    var monday = addDays(d, -(dow - 1));
    var gym = 0, walks = 0;
    for (var i = 0; i < 7; i++) {
      var rec = state.days[key(addDays(monday, i))];
      if (!rec) continue;
      if (rec.habits.gym) gym++;
      if (rec.habits.walk) walks++;
    }
    return { gym: gym, walks: walks };
  }

  /* Totaal tonnage (kg * reps) van alle logs in de week rond een datum */
  function weekVolume(d) {
    var dow = d.getDay() === 0 ? 7 : d.getDay();
    var monday = addDays(d, -(dow - 1));
    var vol = 0, sets = 0;
    for (var i = 0; i < 7; i++) {
      var rec = state.days[key(addDays(monday, i))];
      if (!rec || !rec.workout) continue;
      Object.keys(rec.workout).forEach(function (id) {
        var s = rec.workout[id];
        if (typeof s.kg === "number" && typeof s.reps === "number") { vol += s.kg * s.reps; sets++; }
      });
    }
    return { vol: vol, sets: sets, monday: monday };
  }

  /* Gemiddelde slaap in de week rond een datum, uit de teller */
  function weekSleep(d) {
    var dow = d.getDay() === 0 ? 7 : d.getDay();
    var monday = addDays(d, -(dow - 1));
    var sum = 0, n = 0;
    for (var i = 0; i < 7; i++) {
      var rec = state.days[key(addDays(monday, i))];
      var v = rec && rec.counts && rec.counts.sleep;
      if (typeof v === "number" && v > 0) { sum += v; n++; }
    }
    return n ? sum / n : null;
  }

  function workoutFor(d) { var r = state.days[key(d)]; return (r && r.workout) || {}; }

  /* Geschatte 1RM volgens Epley: kg * (1 + reps/30). Bij 1 rep gewoon het gewicht. */
  function e1rm(kg, reps) {
    if (!kg || !reps) return kg || 0;
    if (reps === 1) return kg;
    return kg * (1 + reps / 30);
  }
  /* Beste e1RM ooit voor een oefening, plus datum */
  function bestE1rm(exId) {
    var best = 0, when = null;
    Object.keys(state.days).forEach(function (k) {
      var w = state.days[k].workout;
      var s = w && w[exId];
      if (s && typeof s.kg === "number" && typeof s.reps === "number") {
        var v = e1rm(s.kg, s.reps);
        if (v > best) { best = v; when = k; }
      }
    });
    return best ? { v: best, date: when } : null;
  }
  /* Vorige sessie: laatste dag voor beforeKey met kg gelogd */
  function lastSession(exId, beforeKey) {
    var keys = Object.keys(state.days).filter(function (k) { return k < beforeKey; }).sort().reverse();
    for (var i = 0; i < keys.length; i++) {
      var w = state.days[keys[i]].workout;
      if (w && w[exId] && typeof w[exId].kg === "number") return w[exId];
    }
    return null;
  }

  function lastWeight(exId, beforeKey) {
    var keys = Object.keys(state.days).filter(function (k) { return k < beforeKey; }).sort().reverse();
    for (var i = 0; i < keys.length; i++) {
      var w = state.days[keys[i]].workout;
      if (w && w[exId] && typeof w[exId].kg === "number") return w[exId].kg;
    }
    return null;
  }
  function allExercises() {
    var seen = {}, out = [];
    Object.keys(PROGRAM).forEach(function (d) {
      (PROGRAM[d].exercises || []).forEach(function (e) { if (!seen[e.id]) { seen[e.id] = 1; out.push(e); } });
    });
    return out;
  }
  function exerciseLog(exId) {
    return Object.keys(state.days)
      .filter(function (k) { var w = state.days[k].workout; return w && w[exId] && typeof w[exId].kg === "number"; })
      .sort()
      .map(function (k) { return { date: k, kg: state.days[k].workout[exId].kg }; });
  }

  /* ---------- helpers ---------- */
  var view = document.getElementById("view");

  var subEl = document.getElementById("subtitle");
  var sheetRoot = document.getElementById("sheet-root");
  var toastEl = document.getElementById("toast");
  var timerEl = document.getElementById("timer");

  var CHECK = '<svg viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.2 3.2L13 4.8"/></svg>';

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; });
  }
  function icon(path, color, size) {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="' + color + '" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"' +
      (size ? ' width="' + size + '" height="' + size + '"' : "") + ">" + path + "</svg>";
  }

  var toastTimer = null;
  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.classList.remove("show"); }, 2200);
  }

  var confetti = (function () {
    var cv = document.getElementById("confetti");
    var ctx = cv.getContext("2d");
    var parts = [], raf = null;
    function resize() { cv.width = innerWidth; cv.height = innerHeight; }
    resize(); addEventListener("resize", resize);
    function frame() {
      ctx.clearRect(0, 0, cv.width, cv.height);
      parts = parts.filter(function (p) { return p.life > 0; });
      parts.forEach(function (p) {
        p.life--; p.x += p.vx; p.y += p.vy; p.vy += 0.16; p.rot += p.vr;
        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.globalAlpha = Math.min(1, p.life / 30);
        ctx.fillStyle = p.c;
        ctx.fillRect(-4, -2, 8, 4);
        ctx.restore();
      });
      if (parts.length) raf = requestAnimationFrame(frame);
      else { ctx.clearRect(0, 0, cv.width, cv.height); raf = null; }
    }
    return function () {
      if (matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      var colors = ["#ff375f", "#30d158", "#64d2ff", "#ffffff"];
      for (var i = 0; i < 90; i++) {
        parts.push({
          x: innerWidth / 2 + (Math.random() - 0.5) * 120,
          y: innerHeight * 0.4,
          vx: (Math.random() - 0.5) * 9,
          vy: -Math.random() * 11 - 3,
          rot: Math.random() * 6, vr: (Math.random() - 0.5) * 0.4,
          life: 70 + Math.random() * 40,
          c: colors[(Math.random() * colors.length) | 0]
        });
      }
      if (!raf) raf = requestAnimationFrame(frame);
    };
  })();

  /* ---------- rusttimer ---------- */
  var restTimer = (function () {
    var DURATIONS = [90, 150, 180];
    var suggested = 90, endsAt = 0, handle = null, open = false;

    function left() { return Math.max(0, Math.ceil((endsAt - Date.now()) / 1000)); }
    function fmt(s) { return Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0"); }

    function paint() {
      var hidden = tab !== "training";
      if (handle) {
        timerEl.className = "running" + (hidden ? " hidden" : "");
        timerEl.innerHTML = '<button class="pill" data-t="stop">' + fmt(left()) + "</button>";
      } else if (open) {
        timerEl.className = hidden ? "hidden" : "";
        timerEl.innerHTML = DURATIONS.map(function (d) {
          return '<button class="pill' + (d === suggested ? " sug" : "") + '" data-t="' + d + '">' + fmt(d) + "</button>";
        }).join("");
      } else {
        timerEl.className = hidden ? "hidden" : "";
        timerEl.innerHTML = '<button class="pill" data-t="open">Rust</button>';
      }
      timerEl.querySelectorAll("[data-t]").forEach(function (b) {
        b.addEventListener("click", function () {
          var v = b.dataset.t;
          sfx.tab();
          if (v === "open") open = true;
          else if (v === "stop") stop();
          else start(parseInt(v, 10));
          paint();
        });
      });
    }
    function tick() {
      if (left() <= 0) {
        stop(); sfx.beep();
        timerEl.classList.add("ding");
        toast("Rust voorbij");
        setTimeout(function () { timerEl.classList.remove("ding"); }, 1000);
      }
      paint();
    }
    function start(sec) { stop(); endsAt = Date.now() + sec * 1000; open = false; handle = setInterval(tick, 250); }
    function stop() { if (handle) clearInterval(handle); handle = null; endsAt = 0; open = false; }

    return {
      paint: paint,
      suggest: function (exId) {
        var prog = PROGRAM[viewDate.getDay()];
        if (!prog || !prog.exercises) return;
        var ex = prog.exercises.filter(function (e) { return e.id === exId; })[0];
        suggested = ex && ex.compound ? 150 : 90;
      }
    };
  })();

  /* ---------- tab: vandaag ---------- */
  function ringsWidget() {
    var rd = ringData(viewDate);
    var R = [52, 40, 28];
    var cls = ["m", "e", "i"];

    var circles = rd.map(function (r, i) {
      var C = 2 * Math.PI * R[i];
      var target = C * (1 - Math.min(1, r.pct));
      // Start op de vorige stand, zodat de ring doorloopt in plaats van springt
      var prevPct = lastRings ? lastRings[i] : 0;
      var from = C * (1 - Math.min(1, prevPct));
      return '<circle class="track ' + cls[i] + '" cx="70" cy="70" r="' + R[i] + '"/>' +
             '<circle class="val ' + cls[i] + '" cx="70" cy="70" r="' + R[i] +
             '" stroke-dasharray="' + C.toFixed(1) +
             '" stroke-dashoffset="' + from.toFixed(1) +
             '" data-target="' + target.toFixed(1) + '"/>';
    }).join("");

    var legend = rd.map(function (r, i) {
      return '<div class="lg ' + cls[i] + '">' +
        '<div class="name">' + esc(r.name) + "</div>" +
        '<div class="num">' + r.done + "<small>/" + r.total + "</small></div></div>";
    }).join("");

    return '<div class="rings-wrap"><div class="rings" id="rings">' +

        '<svg viewBox="0 0 140 140">' + circles + "</svg>" +

  function tile(label, color, iconPath, value, unit, caption, pct) {

      '<div class="lbl" style="color:' + color + '">' + icon(iconPath, color, 15) + esc(label) + "</div>" +
      '<div class="v">' + esc(String(value)) + (unit ? "<small>" + esc(unit) + "</small>" : "") + "</div>" +
      '<div class="c">' + esc(caption) + "</div>" +

        ? '<div class="mini"><i data-w="' + Math.min(100, Math.round(pct * 100)) + '" style="width:0;background:' + color + '"></i></div>'
        : "") +

  function autoRow(label, value, target) {
    var hit = value >= target;
    return '<div class="row locked">' +
      '<span class="box' + (hit ? " on" : "") + '" style="' + (hit ? "background:var(--rest)" : "") + '">' + CHECK + "</span>" +
      '<span class="txt"><span' + (hit ? ' style="color:var(--muted)"' : "") + ">" + esc(label) + "</span></span>" +
      '<span class="tag">' + value + " / " + target + "</span></div>";

  /* Zelfvullend weekrapport: telt en vergelijkt met de vorige week */
  function weekReport() {
    var thisWk = weekVolume(viewDate);
    var lastWk = weekVolume(addDays(thisWk.monday, -1));
    var sleep = weekSleep(viewDate);
    var wc = weekCounts(viewDate);

    var volDelta = "";
    if (thisWk.vol > 0 && lastWk.vol > 0) {
      var pct = Math.round(((thisWk.vol - lastWk.vol) / lastWk.vol) * 100);
      volDelta = (pct >= 0 ? "+" : "") + pct + "% vs vorige week";
    } else if (thisWk.vol > 0) {
      volDelta = "eerste week met volume";
    }

    // gewicht delta binnen de week
    var wStart = null, wEnd = null;
    for (var i = 0; i < 7; i++) {
      var rec = state.days[key(addDays(thisWk.monday, i))];
      if (rec && typeof rec.weight === "number") {
        if (wStart === null) wStart = rec.weight;
        wEnd = rec.weight;
      }
    }
    var wDelta = (wStart !== null && wEnd !== null && wStart !== wEnd)
      ? ((wEnd - wStart >= 0 ? "+" : "") + nl(wEnd - wStart) + " kg")
      : (wEnd !== null ? nl(wEnd) + " kg" : "niet gewogen");

    function line(label, value, color) {
      return '<div class="bar-row" style="border-top:1px solid var(--sep)">' +
        '<span class="n">' + esc(label) + "</span>" +
        '<span class="pr" style="font-size:15px;color:' + (color || "var(--ink)") + '">' + esc(value) + "</span></div>";
    }

    var rows =
      line("Gym", wc.gym + " / 6", wc.gym >= 6 ? "var(--eat)" : "var(--fail)") +
      line("Wandelingen", wc.walks + " / 7", wc.walks >= 7 ? "var(--eat)" : "var(--fail)") +
      line("Volume", thisWk.sets ? Math.round(thisWk.vol).toLocaleString("nl-NL") + " kg" : "niets gelogd", "var(--move)") +
      (volDelta ? line("Trend", volDelta, thisWk.vol >= lastWk.vol ? "var(--eat)" : "var(--orange)") : "") +
      line("Slaap gem.", sleep !== null ? nl(sleep) + " u" : "niet gelogd", sleep !== null && sleep >= 7.5 ? "var(--eat)" : "var(--orange)") +
      line("Gewicht", wDelta, "var(--orange)");

    return '<div class="w"><div class="w-head"><span class="ic">' + icon(ICONS.Groei, "var(--mind)") +
      '</span><span class="t">Weekrapport</span></div>' + rows + "</div>";
  }

  function viewToday() {

            '<span class="stepper">' +

      return '<div class="w">' +

    var weekly = "";

      var manual = WEEKLY.map(function (w) {
        return '<button class="row" data-weekly="' + w.id + '" aria-pressed="' + !!wrec[w.id] + '">' +
          '<span class="box" style="' + (wrec[w.id] ? "background:var(--rest)" : "") + '">' + CHECK + "</span>" +
          '<span class="txt"><span>' + esc(w.label) + "</span></span></button>";
      }).join("");
      weekly = '<div class="w">' +
        '<div class="w-head"><span class="ic">' + icon(ICONS.Herstel, "var(--rest)") +
        '</span><span class="t" style="color:var(--rest)">Zondagreview</span></div>' +
        '<div class="list">' + autoRow("Gym sessies", wc.gym, 6) + autoRow("Wandelingen", wc.walks, 7) + manual + "</div></div>" +
        weekReport();
    }

    return ringsWidget() + tiles + nav + groups + weekly;
  }

  /* ---------- tab: stats ---------- */
  function viewStats() {
    var s = stats();

    var tiles =
      '<div class="grid">' +
        tile("Streak", "var(--move)", ICONS.Training, s.streak, " dagen", "op rij perfect") +
        tile("Perfect", "var(--eat)", ICONS.Voeding, s.perfect, " dagen", "alles afgevinkt") +
        tile("Habits", "var(--mind)", ICONS.Groei, Math.round(s.overall * 100) + "%", "", "gemiddeld gehaald", s.overall) +
        tile("Gemist", "var(--rest)", ICONS.Herstel, s.missed, " dagen", "niet compleet") +
      "</div>";

    var cells = "", todayKey = key(new Date()), i;
    for (i = 1; i <= TOTAL_DAYS; i++) {
      var d = addDays(startDate(), i - 1);
      var k = key(d);
      var c = completionFor(d);
      var future = diffDays(new Date(), d) > 0;
      var isT = k === todayKey;
      var perfect = c.total > 0 && c.done === c.total;
      var cls = ["cell"];
      if (future) cls.push("future");
      if (perfect) cls.push("perfect");
      if (!future && !isT && !perfect) cls.push("miss");
      if (isT) cls.push("today");
      cells += '<button class="' + cls.join(" ") + '" data-goto="' + k + '" aria-label="Dag ' + i + '"' + (future ? " disabled" : "") +
        '><i style="height:' + (future || perfect ? 0 : Math.round(c.pct * 100)) + '%"></i></button>';
    }
    var board = '<div class="w"><div class="w-head"><span class="ic">' + icon(ICONS.Training, "var(--move)") +
      '</span><span class="t">Het bord</span><span class="r">' + s.perfect + " / 75</span></div>" +
      '<div class="board-wrap"><div class="board">' + cells + "</div></div></div>";

    var N = 14, H = 40, pad = 2, bw = (100 - pad * 2) / N, bars = "", labels = "";
    for (var j = 0; j < N; j++) {
      var dd = addDays(new Date(), -(N - 1 - j));
      var ix = dayIndex(dd);
      var cc = (ix >= 1 && ix <= TOTAL_DAYS) ? completionFor(dd) : { pct: 0, done: 0, total: 0 };
      var bh = cc.pct > 0 ? Math.max(cc.pct * (H - 5), 1) : 0;
      var x = pad + j * bw;
      var pf = cc.total > 0 && cc.done === cc.total;
      bars += '<rect class="' + (pf ? "perfect" : "") + '" x="' + (x + bw * 0.16).toFixed(2) + '" y="' + (H - bh).toFixed(2) +
        '" width="' + (bw * 0.68).toFixed(2) + '" height="' + bh.toFixed(2) + '" rx="0.8"></rect>';
      if (j % 3 === 0 || j === N - 1) labels += '<text x="' + (x + bw / 2).toFixed(2) + '" y="' + (H + 6) + '" text-anchor="middle">' + dd.getDate() + "</text>";
    }
    var trend = '<div class="w"><div class="w-head"><span class="ic">' + icon(ICONS.Groei, "var(--mind)") +
      '</span><span class="t">Laatste 14 dagen</span></div>' +
      '<svg class="trend" viewBox="0 0 100 48" preserveAspectRatio="none">' + bars + labels + "</svg></div>";

    var rates = "";
    if (s.elapsed >= 1) {
      var sorted = s.rates.slice().sort(function (a, b) { return a.pct - b.pct; });
      var rows = sorted.map(function (r) {
        var p = Math.round(r.pct * 100);
        return '<div class="bar-row"><span class="n">' + esc(r.label) + "</span>" +
          '<span class="b"><i data-w="' + p + '" style="width:0;background:' + (p < 70 ? "var(--fail)" : GROUP_COLOR[r.group]) + '"></i></span>' +
          '<span class="p">' + p + "%</span></div>";
      }).join("");
      var weak = sorted[0];
      var call = weak.pct < 0.8
        ? '<div class="callout">Zwakste schakel: <b>' + esc(weak.label) + "</b> op " + Math.round(weak.pct * 100) + "%. Daar zit je grootste winst.</div>"
        : '<div class="callout good">Geen zwakke schakel. Laagste habit staat op ' + Math.round(weak.pct * 100) + "%.</div>";
      rates = '<div class="w"><div class="w-head"><span class="ic">' + icon(ICONS.Voeding, "var(--eat)") +
        '</span><span class="t">Consistentie</span><span class="r">zwakste eerst</span></div>' + rows + call + "</div>";
    }

    var recRows = [];
    allExercises().forEach(function (e) {
      var log = exerciseLog(e.id);
      if (!log.length) return;
      var pr = log[0].kg, best = log[0].kg, lastInc = log[0].date;
      for (var q = 1; q < log.length; q++) {
        if (log[q].kg > best) { best = log[q].kg; lastInc = log[q].date; }
        if (log[q].kg >= pr) pr = log[q].kg;
      }
      var since = diffDays(parseKey(lastInc), new Date());
      var e1 = bestE1rm(e.id);
      recRows.push({
        name: e.name, pr: pr, last: log[log.length - 1].kg,
        since: since, stale: log.length >= 2 && since >= 21,
        e1rm: e1 ? e1.v : null
      });
    });

    var records;
    if (!recRows.length) {
      records = '<div class="w"><div class="w-head"><span class="ic">' + icon(ICONS.Training, "var(--move)") +
        '</span><span class="t">Records</span></div><p class="empty">Vul kilo\'s in bij je oefeningen. Daarna zie je hier je PRs en welke lift stilstaat.</p></div>';
    } else {
      recRows.sort(function (a, b) { return (a.stale === b.stale) ? b.since - a.since : (a.stale ? -1 : 1); });
      var rHtml = recRows.map(function (r) {
        var big = r.e1rm ? nl(r.e1rm, r.e1rm >= 100 ? 0 : 1) : nl(r.pr);
        var unit = r.e1rm ? " e1RM" : " kg";
        return '<div class="rec' + (r.stale ? " stale" : "") + '"><span class="n">' + esc(r.name) +
          '<span class="hint">laatst ' + nl(r.last) + " kg &middot; " +
          (r.since === 0 ? "vandaag omhoog" : r.since + " dagen zonder verhoging") + "</span></span>" +
          '<span class="pr">' + big + "<small>" + unit + "</small></span></div>";
      }).join("");
      var stalled = recRows.filter(function (r) { return r.stale; });
      records = '<div class="w"><div class="w-head"><span class="ic">' + icon(ICONS.Training, "var(--move)") +
        '</span><span class="t">Records</span><span class="r">' + recRows.length + " lifts</span></div>" + rHtml +
        (stalled.length ? '<div class="callout">' + stalled.length + " lift" + (stalled.length > 1 ? "s staan" : " staat") +
          " drie weken of langer stil. Check eerst slaap en eten voordat je aan het schema sleutelt.</div>" : "") + "</div>";
    }

    var entries = Object.keys(state.days)
      .filter(function (k2) { return typeof state.days[k2].weight === "number"; })
      .sort().map(function (k2) { return { k: k2, v: state.days[k2].weight }; });

    var weightBody;
    if (entries.length >= 2) {
      var vals = entries.map(function (e) { return e.v; });
      var mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals), span = (mx - mn) || 1;
      var pts = entries.map(function (e, ii) {
        var px = 4 + (ii / (entries.length - 1)) * 92;
        var py = 5 + (1 - (e.v - mn) / span) * 26;
        return px.toFixed(1) + "," + py.toFixed(1);
      });
      var lp = pts[pts.length - 1].split(",");
      var delta = entries[entries.length - 1].v - entries[0].v;
      weightBody = '<svg class="spark" viewBox="0 0 100 44" preserveAspectRatio="none">' +
        '<polyline points="' + pts.join(" ") + '" vector-effect="non-scaling-stroke"/>' +
        '<circle cx="' + lp[0] + '" cy="' + lp[1] + '" r="1.6"/>' +
        '<text x="0" y="42">' + nl(mn) + ' kg</text><text x="100" y="42" text-anchor="end">' + nl(mx) + " kg</text></svg>" +
        '<p class="empty" style="margin-top:6px">' + entries.length + " wegingen &middot; " +
        (delta >= 0 ? "+" : "") + nl(delta) + " kg sinds de start</p>";
    } else if (entries.length === 1) {
      weightBody = '<p class="empty">Een weging gelogd: ' + nl(entries[0].v) + " kg. Voeg een tweede toe voor een trend.</p>";
    } else {
      weightBody = '<p class="empty">Weeg jezelf een keer per week, op dezelfde dag en op hetzelfde moment.</p>';
    }

    var rec2 = state.days[key(viewDate)];
    var cur = rec2 && typeof rec2.weight === "number" ? rec2.weight : "";
    var weight = '<div class="w"><div class="w-head"><span class="ic">' + icon(ICONS.Scale, "var(--orange)") +
      '</span><span class="t" style="color:var(--orange)">Lichaamsgewicht</span></div>' + weightBody +
      '<div style="display:flex;gap:8px;margin-top:10px">' +
      '<input type="number" inputmode="decimal" step="0.1" min="30" max="250" id="w-in" placeholder="kg" value="' + cur + '" aria-label="Gewicht">' +
      '<button class="btn" style="width:auto;padding:0 22px;margin:0" data-act="save-weight">Log</button></div></div>';

    var photos = '<div class="w"><div class="w-head"><span class="ic">' + icon(ICONS.Camera, "var(--mind)") +
      '</span><span class="t">Progressiefoto\'s</span><span class="r" id="photo-count"></span></div>' +
      '<p class="empty" id="photo-empty">Foto\'s laden...</p>' +
      '<div id="photo-strip" style="display:none"></div>' +
      '<label class="btn ghost" style="margin-top:12px;display:flex;align-items:center;justify-content:center;cursor:pointer">' +
        'Foto toevoegen<input type="file" id="photo-in" accept="image/*" hidden></label>' +
      "</div>";

    return tiles + board + trend + rates + records + weight + photos;
  }

  /* ---------- tab: info ---------- */

  /* ---------- render ---------- */
  var TABS = [
    { id: "today",    label: "Vandaag",  icon: '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.5"/>' },
    { id: "training", label: "Training", icon: ICONS.Training },
    { id: "stats",    label: "Stats",    icon: '<path d="M3 3v18h18"/><path d="M7 15l4-6 4 3 5-8"/>' },
    { id: "info",     label: "Info",     icon: '<circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/>' }
  ];

  function renderTabs() {
    var el = document.getElementById("tabs");
    el.innerHTML = TABS.map(function (t) {
      return '<button data-tab="' + t.id + '" class="' + (tab === t.id ? "on" : "") + '">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        t.icon + "</svg><span>" + t.label + "</span></button>";
    }).join("");
    el.querySelectorAll("[data-tab]").forEach(function (b) {
      b.addEventListener("click", function () {
        if (tab === b.dataset.tab) return;
        tab = b.dataset.tab;
        sfx.tab();
        render(true);
        scrollTo({ top: 0 });
      });
    });
  }

  function render(animate) {
    var s = stats();
    var body, scrollKeep = scrollY;

    if (tab === "today") {
      titleEl.textContent = key(viewDate) === key(new Date()) ? "Vandaag" : "Dag " + dayIndex(viewDate);
      subEl.textContent = longLabel(viewDate);
      body = viewToday();
    } else if (tab === "training") {
      titleEl.textContent = "Training";
      subEl.textContent = PROGRAM[viewDate.getDay()].title;
      body = viewTraining();
    } else if (tab === "stats") {
      titleEl.textContent = "Stats";
      subEl.textContent = s.notStarted ? "nog niet begonnen" : "dag " + Math.min(TOTAL_DAYS, s.idx) + " van 75";
      body = viewStats();
    } else {
      titleEl.textContent = "Info";
      subEl.textContent = "regels en programma";
      body = viewInfo();
    }

    view.innerHTML = '<div class="view' + (animate ? " animate" : "") + '">' + body + "</div>";

    // Ringen en balken staan op hun startwaarde. Een frame later zetten we ze op het doel,
    // zodat de CSS transitie loopt in plaats van dat de waarde springt.
    requestAnimationFrame(function () {
      view.querySelectorAll("[data-target]").forEach(function (c) {
        c.setAttribute("stroke-dashoffset", c.dataset.target);
      });
      view.querySelectorAll("[data-w]").forEach(function (b) {
        b.style.width = b.dataset.w + "%";
      });
    });

    if (!animate) scrollTo(0, scrollKeep);

    renderTabs();
    restTimer.paint();
    bind();
  }

  /* Ring die dicht gaat krijgt een eigen geluid */
  function checkRings() {
    var rd = ringData(viewDate);
    if (lastRings) {
      for (var i = 0; i < rd.length; i++) {
        if (rd[i].pct >= 1 && lastRings[i] < 1) {
          sfx.ring();
          toast(rd[i].name + " ring gesloten");
          break;
        }
      }
    }
    lastRings = rd.map(function (r) { return r.pct; });
  }

  function celebrate(d) {
    var k = key(d);
    if (!state.meta.party) state.meta.party = {};
    if (state.meta.party[k]) return false;
    var c = completionFor(d);
    if (c.total > 0 && c.done === c.total) {
      state.meta.party[k] = 1;
      confetti();
      sfx.perfect();
      toast("Perfecte dag");
      return true;
    }
    return false;
  }

  function afterToggle() {
    var party = celebrate(viewDate);
    if (party) lastRings = ringData(viewDate).map(function (r) { return r.pct; });
    else checkRings();
  }

  function bind() {
    view.querySelectorAll("[data-habit]").forEach(function (btn) {
      var h = HABITS.filter(function (x) { return x.id === btn.dataset.habit; })[0];
      if (h && h.auto) return;
      btn.addEventListener("click", function () {
        var rec = dayRecord(key(viewDate));
        var id = btn.dataset.habit;
        if (rec.habits[id]) { delete rec.habits[id]; sfx.untick(); }
        else { rec.habits[id] = true; sfx.tick(); }
        rec.habits.log = true;
        afterToggle();
        save();
        render(false);
      });
    });

    view.querySelectorAll("[data-step]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.dataset.step;
        var dir = parseInt(btn.dataset.dir, 10);
        var h = HABITS.filter(function (x) { return x.id === id; })[0];
        if (!h || !h.counter) return;
        var rec = dayRecord(key(viewDate));
        var cur = typeof rec.counts[id] === "number" ? rec.counts[id] : 0;
        var wasHit = cur >= h.counter.target;
        var cap = h.counter.max || (h.counter.target * 2);
        var next = Math.max(0, Math.min(cap, Math.round((cur + dir * h.counter.step) * 100) / 100));
        rec.counts[id] = next;
        if (next === 0) delete rec.counts[id];
        rec.habits.log = true;
        var nowHit = next >= h.counter.target;
        if (nowHit && !wasHit) sfx.tick();
        else if (!nowHit && wasHit) sfx.untick();
        else sfx.tab();
        afterToggle();
        save();
        render(false);
      });
    });

    view.querySelectorAll("[data-weekly]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var wk = key(viewDate), id = btn.dataset.weekly;
        if (!state.weeks[wk]) state.weeks[wk] = {};
        if (state.weeks[wk][id]) { delete state.weeks[wk][id]; sfx.untick(); }
        else { state.weeks[wk][id] = true; sfx.tick(); }
        save();
        render(false);
      });
    });

    view.querySelectorAll("[data-ex]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.dataset.ex;
        var rec = dayRecord(key(viewDate));
        if (!rec.workout[id]) rec.workout[id] = {};
        rec.workout[id].done = !rec.workout[id].done;
        if (rec.workout[id].done) sfx.tick(); else sfx.untick();
        if (!rec.workout[id].done && typeof rec.workout[id].kg !== "number") delete rec.workout[id];

        var prog = PROGRAM[viewDate.getDay()];
        if (prog && prog.exercises && !prog.optional) {
          var all = prog.exercises.every(function (e) { return rec.workout[e.id] && rec.workout[e.id].done; });
          if (all && !rec.habits.gym) {
            rec.habits.gym = true;
            sfx.done();
            toast("Gym afgevinkt");
          }
        }
        rec.habits.log = true;
        restTimer.suggest(id);
        afterToggle();
        save();
        render(false);
      });
    });

    view.querySelectorAll("[data-kg]").forEach(function (input) {
      input.addEventListener("change", function () {
        var id = input.dataset.kg;
        var rec = dayRecord(key(viewDate));
        var v = parseFloat(input.value.replace(",", "."));
        if (!rec.workout[id]) rec.workout[id] = {};
        if (isNaN(v)) delete rec.workout[id].kg;
        else {
          var prev = lastWeight(id, key(viewDate));
          rec.workout[id].kg = Math.round(v * 2) / 2;
          if (prev !== null && rec.workout[id].kg > prev) { sfx.done(); toast("Zwaarder dan vorige keer"); }
        }
        rec.habits.log = true;
        save();
      });
    });

    view.querySelectorAll("[data-reps]").forEach(function (input) {
      input.addEventListener("change", function () {
        var id = input.dataset.reps;
        var rec = dayRecord(key(viewDate));
        var v = parseInt(input.value, 10);
        if (!rec.workout[id]) rec.workout[id] = {};
        if (isNaN(v) || v <= 0) delete rec.workout[id].reps;
        else rec.workout[id].reps = v;
        rec.habits.log = true;
        save();
      });
    });

    view.querySelectorAll("[data-nav]").forEach(function (b) {
      b.addEventListener("click", function () {
        var n = addDays(viewDate, parseInt(b.dataset.nav, 10));
        if (diffDays(new Date(), n) > 0) return;
        viewDate = n;
        lastRings = null;
        sfx.tab();
        render(true);
      });
    });

    view.querySelectorAll("[data-goto]").forEach(function (b) {
      b.addEventListener("click", function () {
        var d = parseKey(b.dataset.goto);
        if (diffDays(new Date(), d) > 0) return;
        viewDate = d;
        tab = "today";
        lastRings = null;
        sfx.tab();
        render(true);
        scrollTo({ top: 0 });
      });
    });

    var sw = view.querySelector('[data-act="save-weight"]');
    if (sw) sw.addEventListener("click", function () {
      var v = parseFloat(document.getElementById("w-in").value.replace(",", "."));
      var rec = dayRecord(key(viewDate));
      if (isNaN(v)) delete rec.weight;
      else { rec.weight = Math.round(v * 10) / 10; sfx.tick(); toast("Gewicht gelogd"); }
      rec.habits.log = true;
      save();
      render(false);
    });

    var rings = document.getElementById("rings");
    if (rings) tilt(rings);

    if (tab === "stats") bindPhotos();
  }

  function bindPhotos() {
    var input = document.getElementById("photo-in");
    var strip = document.getElementById("photo-strip");
    var emptyEl = document.getElementById("photo-empty");
    var countEl = document.getElementById("photo-count");
    if (!input || !strip) return;

    function refresh() {
      photoDB.keys().then(function (keys) {
        keys.sort();
        countEl.textContent = keys.length ? keys.length + " foto's" : "";
        if (!keys.length) {
          emptyEl.style.display = "";
          emptyEl.textContent = "Nog geen foto's. Maak er elke week een, dan zie je op dag 75 het verschil.";
          strip.style.display = "none";
          strip.innerHTML = "";
          return;
        }
        emptyEl.style.display = "none";
        strip.style.display = "grid";
        strip.style.gridTemplateColumns = "repeat(3, 1fr)";
        strip.style.gap = "6px";
        strip.innerHTML = "";
        keys.forEach(function (k) {
          photoDB.get(k).then(function (blob) {
            if (!blob) return;
            var url = URL.createObjectURL(blob);
            var cell = document.createElement("div");
            cell.style.cssText = "position:relative;aspect-ratio:3/4;border-radius:12px;overflow:hidden";
            var img = document.createElement("img");
            img.src = url;
            img.loading = "lazy";
            img.style.cssText = "width:100%;height:100%;object-fit:cover;display:block";
            img.addEventListener("load", function () { URL.revokeObjectURL(url); });
            var date = document.createElement("span");
            date.textContent = k.replace(/^photo:/, "").slice(5); // dd deel
            date.style.cssText = "position:absolute;left:6px;bottom:6px;font:600 10px var(--mono);color:#fff;text-shadow:0 1px 3px #000";
            var del = document.createElement("button");
            del.textContent = "\u00d7";
            del.setAttribute("aria-label", "verwijder foto");
            del.style.cssText = "position:absolute;top:4px;right:4px;width:24px;height:24px;border:0;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;font-size:15px;cursor:pointer";
            del.addEventListener("click", function () {
              if (del.dataset.c !== "1") { del.dataset.c = "1"; del.textContent = "?"; setTimeout(function () { del.dataset.c = "0"; del.textContent = "\u00d7"; }, 2500); return; }
              photoDB.del(k).then(refresh);
            });
            cell.appendChild(img); cell.appendChild(date); cell.appendChild(del);
            strip.appendChild(cell);
          });
        });
      }).catch(function () {
        emptyEl.textContent = "Foto-opslag niet beschikbaar in deze browser.";
      });
    }

    input.addEventListener("change", function () {
      var f = input.files && input.files[0];
      if (!f) return;
      emptyEl.style.display = "";
      emptyEl.textContent = "Foto verwerken...";
      shrinkImage(f).then(function (blob) {
        var k = "photo:" + key(viewDate);
        return photoDB.put(k, blob);
      }).then(function () {
        sfx.done();
        toast("Foto opgeslagen");
        input.value = "";
        refresh();
      }).catch(function () {
        toast("Foto opslaan mislukt");
        emptyEl.textContent = "Opslaan mislukt.";
      });
    });

    refresh();
  }

  function tilt(el) {
    var rect = null;

    function move(e) {
      var t = e.touches ? e.touches[0] : e;
      if (!rect) rect = el.getBoundingClientRect();
      var px = (t.clientX - rect.left) / rect.width;
      var py = (t.clientY - rect.top) / rect.height;
      el.classList.add("grabbed");
      el.style.transition = "none";
      el.style.transform =
        "rotateY(" + ((px - 0.5) * 22).toFixed(2) + "deg) rotateX(" + ((0.5 - py) * 16).toFixed(2) + "deg) scale(1.02)";
      el.style.setProperty("--gx", (px * 100).toFixed(0) + "%");
      el.style.setProperty("--gy", (py * 100).toFixed(0) + "%");
    }

    function end() {
      rect = null;
      el.classList.remove("grabbed");
      el.style.transition = "";
      el.style.transform = "";
      el.style.setProperty("--gx", "60%");
      el.style.setProperty("--gy", "20%");
    }

    // niet passive: we willen preventDefault zodat de pagina niet meescrollt tijdens het kantelen
    el.addEventListener("touchstart", function (e) { move(e); }, { passive: true });
    el.addEventListener("touchmove", function (e) { e.preventDefault(); move(e); }, { passive: false });
    el.addEventListener("touchend", end);
    el.addEventListener("touchcancel", end);
    el.addEventListener("mousemove", move);
    el.addEventListener("mouseleave", end);
  }

  /* ---------- sheets ---------- */
  function sheet(html) {
    sheetRoot.innerHTML = '<div class="backdrop"><div class="sheet"><div class="grabber"></div>' + html + "</div></div>";
    sheetRoot.querySelector(".backdrop").addEventListener("click", function (e) {
      if (e.target.classList.contains("backdrop")) closeSheet();
    });
  }
  function closeSheet() { sheetRoot.innerHTML = ""; }

  function openSetup() {
    sheet(
      "<h2>Start de challenge</h2>" +
      "<p>Kies de datum van dag 1 en je huidige gewicht. Beide later aan te passen.</p>" +
      '<div class="field"><label for="s-date">Dag 1</label><input type="date" id="s-date" value="' + key(new Date()) + '"></div>' +
      '<div class="field"><label for="s-weight">Gewicht in kg, optioneel</label><input type="number" inputmode="decimal" step="0.1" id="s-weight" placeholder="78,0"></div>' +
      '<button class="btn" id="begin">Starten</button>'
    );
    document.getElementById("begin").addEventListener("click", function () {
      var d = document.getElementById("s-date").value;
      var w = parseFloat(document.getElementById("s-weight").value.replace(",", "."));
      state = defaultState();
      if (d) state.config.startDate = d;
      if (!isNaN(w)) {
        state.config.bodyweight = w;
        dayRecord(state.config.startDate).weight = Math.round(w * 10) / 10;
      }
      closeSheet();
      sfx.unlock(); sfx.done();
      save();
      render(true);
    });
  }

  function openSettings() {
    var soundOn = state.meta.sound !== false;
    sheet(
      "<h2>Instellingen</h2>" +
      "<p>Dag 1 verzetten schuift het hele bord op. Je logs blijven aan hun kalenderdatum hangen.</p>" +
      '<div class="field"><label for="c-date">Dag 1</label><input type="date" id="c-date" value="' + esc(state.config.startDate) + '"></div>' +
      '<div class="field"><label for="c-weight">Gewicht in kg</label><input type="number" inputmode="decimal" step="0.1" id="c-weight" value="' + (state.config.bodyweight || "") + '"></div>' +
      '<div class="switch"><span>Geluid</span><button class="toggle' + (soundOn ? " on" : "") + '" id="snd"></button></div>' +
      '<button class="btn" id="apply">Opslaan</button>' +
      '<button class="btn ghost" id="exp">Back-up exporteren</button>' +
      '<button class="btn ghost" id="imp">Back-up importeren</button>' +
      '<button class="btn danger" id="rst">Alles wissen</button>' +
      '<input type="file" id="file" accept="application/json" hidden>'
    );

    document.getElementById("snd").addEventListener("click", function () {
      state.meta.sound = state.meta.sound === false;
      this.classList.toggle("on", state.meta.sound !== false);
      if (state.meta.sound !== false) { sfx.unlock(); sfx.tick(); }
      save();
    });
    document.getElementById("apply").addEventListener("click", function () {
      var d = document.getElementById("c-date").value;
      var w = parseFloat(document.getElementById("c-weight").value.replace(",", "."));
      if (d) state.config.startDate = d;
      state.config.bodyweight = isNaN(w) ? null : w;
      closeSheet(); save(); render(true);
      toast("Opgeslagen");
    });
    document.getElementById("exp").addEventListener("click", exportBackup);

    var file = document.getElementById("file");
    document.getElementById("imp").addEventListener("click", function () { file.click(); });
    file.addEventListener("change", function () {
      var f = file.files && file.files[0];
      if (!f) return;
      var r = new FileReader();
      r.onload = function () {
        try {
          var p = JSON.parse(r.result);
          if (!p || !p.config || !p.config.startDate) throw new Error("ongeldig");
          state = p;
          if (!state.days) state.days = {};
          if (!state.weeks) state.weeks = {};
          if (!state.meta) state.meta = {};
          viewDate = new Date();
          lastRings = null;
          closeSheet(); save(); render(true);
          toast("Back-up geladen");
        } catch (e) { toast("Bestand niet leesbaar"); }
      };
      r.readAsText(f);
    });

    var rst = document.getElementById("rst");
    rst.addEventListener("click", function () {
      if (rst.dataset.c !== "1") {
        rst.dataset.c = "1";
        rst.textContent = "Tik nog een keer om te wissen";
        return;
      }
      state = defaultState();
      viewDate = new Date();
      tab = "today";
      lastRings = null;
      closeSheet(); save(); render(true);
      openSetup();
    });
  }

  function exportBackup() {
    try {
      var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "challenge75-" + key(new Date()) + ".json";
      a.click();
      URL.revokeObjectURL(a.href);
      state.meta.lastExport = key(new Date());
      delete state.meta.snooze;
      save();
      toast("Back-up gemaakt");
    } catch (e) { toast("Exporteren mislukt"); }
  }

  document.getElementById("gear").addEventListener("click", function () { sfx.tab(); openSettings(); });

  function backupNudge() {
    var meta = state.meta || {};
    var since = meta.lastExport ? diffDays(parseKey(meta.lastExport), new Date()) : null;
    if (meta.snooze && diffDays(parseKey(meta.snooze), new Date()) < 7) return;
    if (since === null && elapsedDays() < 7) return;
    if (since !== null && since < 14) return;
    setTimeout(function () {
      toast(since === null ? "Maak een back-up van je data" : "Back-up is " + since + " dagen oud");
      state.meta.snooze = key(new Date());
      save();
    }, 2600);
  }

  /* ---------- boot ---------- */
  var topbar = document.getElementById("topbar");
  addEventListener("scroll", function () {
    topbar.classList.toggle("scrolled", scrollY > 6);
  }, { passive: true });

  addEventListener("touchstart", function once() { sfx.unlock(); removeEventListener("touchstart", once); }, { passive: true });
  addEventListener("click", function once() { sfx.unlock(); removeEventListener("click", once); });

  document.addEventListener("visibilitychange", function () { if (!document.hidden) render(false); });

  var stored = load();
  if (stored && stored.config && stored.config.startDate) {
    state = stored;
    if (!state.days) state.days = {};
    if (!state.weeks) state.weeks = {};
    if (!state.meta) state.meta = {};
    render(true);
    lastRings = ringData(viewDate).map(function (r) { return r.pct; });
    backupNudge();
  } else {
    state = defaultState();
    render(true);
  }

  var splash = document.getElementById("splash");
  var wait = matchMedia("(prefers-reduced-motion: reduce)").matches ? 0 : 1250;
  setTimeout(function () {
    splash.classList.add("out");
    setTimeout(function () {
      splash.remove();
      if (!stored || !stored.config) openSetup();
    }, 460);
  }, wait);

  if ("serviceWorker" in navigator && location.protocol === "https:") {
    addEventListener("load", function () {
      navigator.serviceWorker.register("/sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
