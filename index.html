<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>75 Dagen</title>

<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="75 Dagen">

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">

<style>
  :root {
    --bg: #000000;
    --card: #131417;
    --card-2: #1c1d21;
    --sep: rgba(255, 255, 255, 0.08);
    --ink: #f2f3f5;
    --muted: #8e939c;
    --accent: #5ad1e6;
    --accent-2: #3aa8ff;
    --fail: #ff453a;

    --r: 16px;
    --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);

    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;

    --tabbar: 64px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  body {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px calc(var(--tabbar) + 40px + env(safe-area-inset-bottom));
  }

  h1, h2, h3 { margin: 0; font-weight: 700; letter-spacing: -0.02em; }
  button { font-family: var(--sans); }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ============ splash ============ */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: radial-gradient(120% 90% at 50% 0%, #16181d 0%, #000 70%);
    display: grid;
    place-items: center;
    perspective: 600px;
    transition: opacity 0.45s var(--ease), transform 0.45s var(--ease);
  }
  #splash.out { opacity: 0; transform: scale(1.08); pointer-events: none; }

  .cube {
    width: 84px;
    height: 84px;
    position: relative;
    transform-style: preserve-3d;
    animation: tumble 1.6s var(--ease) infinite;
  }
  .cube .f {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-size: 30px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(90, 209, 230, 0.06);
    border: 1px solid rgba(90, 209, 230, 0.35);
    border-radius: 14px;
    backdrop-filter: blur(2px);
  }
  .cube .f1 { transform: translateZ(42px); }
  .cube .f2 { transform: rotateY(90deg) translateZ(42px); }
  .cube .f3 { transform: rotateY(180deg) translateZ(42px); }
  .cube .f4 { transform: rotateY(-90deg) translateZ(42px); }
  .cube .f5 { transform: rotateX(90deg) translateZ(42px); }
  .cube .f6 { transform: rotateX(-90deg) translateZ(42px); }

  @keyframes tumble {
    0%   { transform: rotateX(-20deg) rotateY(0deg); }
    100% { transform: rotateX(-20deg) rotateY(360deg); }
  }

  .splash-label {
    position: absolute;
    bottom: 22%;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.9; } }

  /* ============ topbar ============ */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: calc(env(safe-area-inset-top) + 12px) 0 10px;
    background: rgba(0, 0, 0, 0.72);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s linear;
  }
  header.scrolled { border-bottom-color: var(--sep); }
  header h1 { font-size: 30px; }
  header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .gear {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--sep);
    color: var(--muted);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: transform 0.25s var(--spring);
  }
  .gear:active { transform: scale(0.88) rotate(35deg); }

  /* ============ view ============ */
  main { padding-top: 18px; }
  .view { animation: viewIn 0.42s var(--ease) both; }
  @keyframes viewIn {
    from { opacity: 0; transform: translateY(14px) scale(0.985); }
    to   { opacity: 1; transform: none; }
  }

  .card {
    background: var(--card);
    border: 1px solid var(--sep);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 14px;
  }
  .card > h2 { font-size: 17px; margin-bottom: 4px; }
  .card > .eyebrow { display: block; margin-bottom: 12px; }

  .stagger > * { animation: pop 0.4s var(--ease) both; }
  .stagger > *:nth-child(1) { animation-delay: 0.02s; }
  .stagger > *:nth-child(2) { animation-delay: 0.05s; }
  .stagger > *:nth-child(3) { animation-delay: 0.08s; }
  .stagger > *:nth-child(4) { animation-delay: 0.11s; }
  .stagger > *:nth-child(5) { animation-delay: 0.14s; }
  .stagger > *:nth-child(6) { animation-delay: 0.17s; }
  @keyframes pop {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  /* ============ hero dial, 3D ============ */
  .hero-wrap { perspective: 900px; margin-bottom: 16px; }
  .hero {
    position: relative;
    background: linear-gradient(160deg, #1a1d22 0%, #0d0e11 100%);
    border: 1px solid var(--sep);
    border-radius: 22px;
    padding: 26px 20px 22px;
    transform-style: preserve-3d;
    transition: transform 0.5s var(--ease);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
    overflow: hidden;
  }
  .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(60% 60% at var(--gx, 50%) var(--gy, 30%), rgba(90, 209, 230, 0.16), transparent 70%);
    pointer-events: none;
    transition: opacity 0.3s linear;
  }
  .hero-inner { display: flex; align-items: center; gap: 20px; transform: translateZ(30px); }

  .ring { position: relative; width: 112px; height: 112px; flex: 0 0 auto; }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring .track { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 9; }
  .ring .prog {
    fill: none;
    stroke: url(#grad);
    stroke-width: 9;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s var(--ease);
    filter: drop-shadow(0 0 6px rgba(90, 209, 230, 0.5));
  }
  .ring .pct {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
  }

  .hero-meta { flex: 1; min-width: 0; }
  .hero-day {
    font-family: var(--mono);
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .hero-day small { font-size: 17px; color: var(--muted); }
  .hero-sub { color: var(--muted); font-size: 13px; margin-top: 8px; line-height: 1.45; }
  .hero-streak {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(90, 209, 230, 0.12);
    border: 1px solid rgba(90, 209, 230, 0.3);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    font-family: var(--mono);
  }

  /* ============ list rows ============ */
  .list { margin: 0 -16px; }
  .row {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    min-height: 54px;
    padding: 10px 16px;
    background: none;
    border: 0;
    border-top: 1px solid var(--sep);
    color: var(--ink);
    font-size: 16px;
    text-align: left;
    cursor: pointer;
    transition: background-color 0.15s linear, transform 0.25s var(--spring);
  }
  .row:active { background: var(--card-2); transform: scale(0.985); }

  .box {
    flex: 0 0 auto;
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid #40454e;
    display: grid;
    place-items: center;
    transform-style: preserve-3d;
    transition: transform 0.45s var(--spring), background-color 0.3s var(--ease), border-color 0.3s var(--ease);
  }
  .box svg { width: 14px; height: 14px; opacity: 0; transform: scale(0.5); transition: opacity 0.2s var(--ease), transform 0.35s var(--spring); }
  [aria-pressed="true"] .box,
  .box.on {
    background: linear-gradient(145deg, var(--accent), var(--accent-2));
    border-color: transparent;
    transform: rotateY(360deg);
  }
  [aria-pressed="true"] .box svg,
  .box.on svg { opacity: 1; transform: scale(1); }

  .txt { flex: 1; min-width: 0; }
  .txt .hint { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
  [aria-pressed="true"] .txt > span:first-child { color: var(--muted); }
  .tag { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .row.locked { cursor: default; }
  .row.locked:active { transform: none; background: none; }

  /* ============ stats grid ============ */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .tile {
    background: var(--card);
    border: 1px solid var(--sep);
    border-radius: var(--r);
    padding: 16px;
    transition: transform 0.3s var(--spring);
  }
  .tile:active { transform: scale(0.97); }
  .tile .v { font-family: var(--mono); font-size: 30px; font-weight: 700; letter-spacing: -0.03em; display: block; }
  .tile .v.accent { color: var(--accent); }
  .tile .k { font-size: 12px; color: var(--muted); margin-top: 4px; display: block; }

  /* ============ board ============ */
  .board-wrap { perspective: 800px; }
  .board {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    transform: rotateX(8deg);
    transform-style: preserve-3d;
  }
  .cell {
    aspect-ratio: 1;
    border-radius: 5px;
    background: #17191d;
    border: 1px solid transparent;
    padding: 0;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.4s var(--spring);
  }
  .cell > i {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 0;
    background: rgba(90, 209, 230, 0.35);
    transition: height 0.6s var(--ease);
  }
  .cell.perfect { background: linear-gradient(145deg, var(--accent), var(--accent-2)); box-shadow: 0 3px 10px rgba(90, 209, 230, 0.3); }
  .cell.perfect > i { height: 0; }
  .cell.miss { border-color: rgba(255, 69, 58, 0.35); }
  .cell.today { border-color: #fff; transform: translateZ(10px) scale(1.06); }
  .cell.future { background: #0d0e10; }
  .cell:active { transform: scale(0.88); }
  .cell.flip { animation: flip3d 0.7s var(--ease); }
  @keyframes flip3d {
    0%   { transform: rotateY(0); }
    100% { transform: rotateY(360deg); }
  }

  /* ============ charts ============ */
  .trend { width: 100%; height: 96px; display: block; }
  .trend rect { fill: rgba(90, 209, 230, 0.3); transition: height 0.6s var(--ease), y 0.6s var(--ease); }
  .trend rect.perfect { fill: var(--accent); }
  .trend text { fill: var(--muted); font-family: var(--mono); font-size: 7px; }

  .spark { width: 100%; height: 76px; display: block; }
  .spark polyline { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .spark circle { fill: var(--accent); }
  .spark text { fill: var(--muted); font-family: var(--mono); font-size: 8px; }

  .bar-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-top: 1px solid var(--sep); }
  .bar-row:first-child { border-top: 0; }
  .bar-row .n { flex: 1; font-size: 14px; }
  .bar-row .b { flex: 0 0 80px; height: 6px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; }
  .bar-row .b > i { display: block; height: 100%; background: var(--accent); border-radius: 999px; transition: width 0.8s var(--ease); }
  .bar-row .b > i.low { background: var(--fail); }
  .bar-row .p { flex: 0 0 40px; text-align: right; font-family: var(--mono); font-size: 13px; color: var(--muted); }

  .callout {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    background: rgba(255, 69, 58, 0.1);
    border: 1px solid rgba(255, 69, 58, 0.25);
    font-size: 13px;
    line-height: 1.5;
  }
  .callout.good {
    background: rgba(90, 209, 230, 0.1);
    border-color: rgba(90, 209, 230, 0.25);
  }

  .empty { color: var(--muted); font-size: 13px; line-height: 1.5; }

  /* ============ training ============ */
  .ex {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    border-top: 1px solid var(--sep);
    transition: background-color 0.15s linear;
  }
  .ex-check { background: none; border: 0; padding: 4px; cursor: pointer; display: grid; place-items: center; }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name { font-size: 15px; display: block; }
  .ex.done .ex-name { color: var(--muted); }
  .kg {
    flex: 0 0 74px;
    width: 74px;
    height: 40px;
    background: var(--card-2);
    border: 1px solid var(--sep);
    border-radius: 10px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 16px;
    text-align: center;
  }
  .kg:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .rec { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-top: 1px solid var(--sep); }
  .rec:first-of-type { border-top: 0; }
  .rec .n { flex: 1; font-size: 14px; }
  .rec .n .hint { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
  .rec.stale .n .hint { color: var(--fail); }
  .rec .pr { font-family: var(--mono); font-size: 19px; font-weight: 700; color: var(--accent); }
  .rec .pr small { font-size: 11px; color: var(--muted); font-weight: 400; }

  /* ============ info ============ */
  .rule { display: flex; gap: 12px; padding: 11px 0; border-top: 1px solid var(--sep); font-size: 15px; line-height: 1.4; }
  .rule:first-of-type { border-top: 0; }
  .rule .dot { flex: 0 0 auto; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 7px; }

  .prog-day { padding: 12px 0; border-top: 1px solid var(--sep); }
  .prog-day:first-of-type { border-top: 0; }
  .prog-day h3 { font-size: 15px; margin-bottom: 6px; }
  .prog-day p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.6; }

  /* ============ tab bar ============ */
  nav {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 40;
    height: calc(var(--tabbar) + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    background: rgba(10, 10, 12, 0.82);
    backdrop-filter: saturate(180%) blur(22px);
    -webkit-backdrop-filter: saturate(180%) blur(22px);
    border-top: 1px solid var(--sep);
  }
  nav button {
    flex: 1;
    background: none;
    border: 0;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.2s linear;
  }
  nav button svg { width: 22px; height: 22px; transition: transform 0.4s var(--spring); }
  nav button.on { color: var(--accent); }
  nav button.on svg { transform: translateY(-2px) scale(1.12); }
  nav button:active svg { transform: scale(0.85); }

  /* ============ rest timer ============ */
  #timer {
    position: fixed;
    right: 14px;
    bottom: calc(var(--tabbar) + 14px + env(safe-area-inset-bottom));
    z-index: 45;
    display: flex;
    gap: 6px;
  }
  #timer .pill {
    height: 46px;
    padding: 0 16px;
    border-radius: 999px;
    background: rgba(28, 29, 33, 0.9);
    backdrop-filter: blur(14px);
    border: 1px solid var(--sep);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    transition: transform 0.3s var(--spring);
    animation: pop 0.35s var(--ease) both;
  }
  #timer .pill:active { transform: scale(0.9); }
  #timer .pill.sug { border-color: var(--accent); color: var(--accent); }
  #timer.running .pill {
    background: linear-gradient(145deg, var(--accent), var(--accent-2));
    color: #04262c;
    font-weight: 700;
    border-color: transparent;
  }
  #timer.ding .pill { animation: shake 0.45s var(--ease) 2; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  #timer.hidden { display: none; }

  /* ============ sheet ============ */
  .backdrop {
    position: fixed;
    inset: 0;
    z-index: 60;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: flex-end;
    animation: fade 0.3s var(--ease);
  }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .sheet {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    background: #16171b;
    border-radius: 22px 22px 0 0;
    border-top: 1px solid var(--sep);
    padding: 10px 18px calc(28px + env(safe-area-inset-bottom));
    animation: up 0.42s var(--spring);
    max-height: 88vh;
    overflow-y: auto;
  }
  @keyframes up { from { transform: translateY(100%); } to { transform: none; } }
  .grabber { width: 38px; height: 5px; border-radius: 999px; background: #3a3d44; margin: 0 auto 16px; }
  .sheet h2 { font-size: 21px; margin-bottom: 6px; }
  .sheet p { color: var(--muted); font-size: 13px; line-height: 1.5; margin: 0 0 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  input[type="number"], input[type="date"] {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    background: var(--card-2);
    border: 1px solid var(--sep);
    border-radius: 12px;
    color: var(--ink);
    font-family: var(--mono);
    font-size: 16px;
  }
  input:focus { outline: 2px solid var(--accent); border-color: transparent; }

  .btn {
    width: 100%;
    height: 50px;
    border: 0;
    border-radius: 14px;
    background: linear-gradient(145deg, var(--accent), var(--accent-2));
    color: #04262c;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.25s var(--spring);
    margin-top: 8px;
  }
  .btn:active { transform: scale(0.96); }
  .btn.ghost { background: var(--card-2); color: var(--ink); border: 1px solid var(--sep); }
  .btn.danger { background: rgba(255, 69, 58, 0.12); color: var(--fail); border: 1px solid rgba(255, 69, 58, 0.3); }

  .switch { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-top: 1px solid var(--sep); }
  .switch span { font-size: 15px; }
  .toggle {
    width: 51px; height: 31px;
    border-radius: 999px;
    background: #39393d;
    border: 0;
    position: relative;
    cursor: pointer;
    transition: background-color 0.3s var(--ease);
  }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 27px; height: 27px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.35s var(--spring);
  }
  .toggle.on { background: linear-gradient(145deg, var(--accent), var(--accent-2)); }
  .toggle.on::after { transform: translateX(20px); }

  /* ============ toast + confetti ============ */
  #toast {
    position: fixed;
    left: 50%;
    top: calc(env(safe-area-inset-top) + 14px);
    transform: translate(-50%, -140%);
    z-index: 80;
    background: rgba(28, 29, 33, 0.95);
    backdrop-filter: blur(16px);
    border: 1px solid var(--sep);
    border-radius: 999px;
    padding: 11px 18px;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
    transition: transform 0.5s var(--spring);
  }
  #toast.show { transform: translate(-50%, 0); }

  function defaultState() {

  function dayRecord(k) {
    if (!state.days[k]) state.days[k] = { habits: {}, workout: {} };

    return state.days[k];
  }

  function requiredHabits(d) {
    return HABITS.filter(function (h) { return !(h.restExempt && isSunday(d)); });
  }

  function completionFor(d) {
    var rec = state.days[key(d)];
    var req = requiredHabits(d);
    var done = rec ? req.filter(function (h) { return rec.habits[h.id]; }).length : 0;
    return { done: done, total: req.length, pct: req.length ? done / req.length : 0 };
  }

  function startDate() { return parseKey(state.config.startDate); }
  function dayIndex(d) { return diffDays(startDate(), d) + 1; }
  function elapsedDays() { return Math.max(0, Math.min(TOTAL_DAYS, dayIndex(new Date()))); }

  function stats() {
    var idx = dayIndex(new Date());
    var elapsed = elapsedDays();
    var doneSum = 0, reqSum = 0, perfect = 0, missed = 0, i, c;

    for (i = 1; i <= elapsed; i++) {
      c = completionFor(addDays(startDate(), i - 1));
      doneSum += c.done; reqSum += c.total;
      if (c.total > 0 && c.done === c.total) perfect++;
      else if (i < idx) missed++;
    }

    var streak = 0, cursor = elapsed;
    if (cursor >= 1) {
      var t = completionFor(addDays(startDate(), cursor - 1));
      if (t.done < t.total) cursor--;
    }
    while (cursor >= 1) {
      c = completionFor(addDays(startDate(), cursor - 1));
      if (c.total > 0 && c.done === c.total) { streak++; cursor--; } else break;
    }

    var rates = HABITS.map(function (h) {
      var done = 0, total = 0, day, rec;
      for (var j = 1; j <= elapsed; j++) {
        day = addDays(startDate(), j - 1);

        if (rec && rec.habits[h.id]) done++;

      return { label: h.label, pct: total ? done / total : 0 };
    });

      idx: idx, elapsed: elapsed,
      remaining: Math.max(0, TOTAL_DAYS - Math.max(0, idx)),

    function resize() { cv.width = innerWidth; cv.height = innerHeight; }

      ctx.clearRect(0, 0, cv.width, cv.height);
      parts = parts.filter(function (p) { return p.life > 0; });
      parts.forEach(function (p) {
        p.life--;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.16;
        p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);

        ctx.fillStyle = p.c;
        ctx.fillRect(-4, -2, 8, 4);

          "</div>" +
          '<div class="hero-meta">' +
            '<div class="hero-day">' + (s.notStarted ? "0" : Math.max(0, Math.min(TOTAL_DAYS, s.idx))) + "<small>/75</small></div>" +
            '<div class="hero-sub">' + esc(c.done + " van " + c.total + " habits") + "<br>" + esc(s.remaining + " dagen te gaan") + "</div>" +
            (s.streak > 0 ? '<div class="hero-streak">' + s.streak + " dagen streak</div>" : "") +
          "</div>" +
        "</div>" +
      "</div></div>";

    var nav =
      '<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px">' +
        '<button class="gear" data-nav="-1" aria-label="Vorige dag">&#8592;</button>' +
        '<span style="font-size:14px;font-family:var(--mono)">' +
          (vIdx < 1 || vIdx > TOTAL_DAYS ? "Buiten challenge" : "Dag " + vIdx) + " &middot; " + esc(longLabel(viewDate)) +
        "</span>" +
        '<button class="gear" data-nav="1" aria-label="Volgende dag"' + (canFwd ? "" : " disabled style=\"opacity:.3\"") + ">&#8594;</button>" +
      "</div>";

    var groups = GROUPS.map(function (g) {
      var items = HABITS.filter(function (h) { return h.group === g; });
      if (!items.length) return "";
      var rows = items.map(function (h) {
        var na = h.restExempt && isSunday(viewDate);
        var rec = state.days[key(viewDate)];
        var on = !!(rec && rec.habits[h.id]);
        return '<button class="row' + (na || h.auto ? " locked" : "") + '" data-habit="' + h.id + '" aria-pressed="' + (na ? "false" : on) + '"' + (na ? " disabled" : "") + ">" +
          '<span class="box">' + CHECK + "</span>" +
          '<span class="txt"><span>' + esc(h.label) + "</span>" +
            (h.hint ? '<span class="hint">' + esc(h.hint) + "</span>" : "") +
          "</span>" +
          (na ? '<span class="tag">RUST</span>' : (h.auto ? '<span class="tag">AUTO</span>' : "")) +
        "</button>";
      }).join("");
      return '<div class="card"><span class="eyebrow">' + esc(g) + '</span><div class="list">' + rows + "</div></div>";
    }).join("");

    var weekly = "";
    if (isSunday(viewDate)) {
      var wk = key(viewDate);
      var rec = state.weeks[wk] || {};
      var gym = 0, walks = 0;
      for (var i = 6; i >= 0; i--) {
        var d = state.days[key(addDays(viewDate, -i))];
        if (!d) continue;
        if (d.habits.gym) gym++;
        if (d.habits.walk) walks++;
      }
      var auto =
        autoRow("Gym sessies", gym, 6) +
        autoRow("Wandelingen", walks, 7);
      var manual = WEEKLY.map(function (w) {
        return '<button class="row" data-weekly="' + w.id + '" aria-pressed="' + !!rec[w.id] + '">' +
          '<span class="box">' + CHECK + '</span><span class="txt"><span>' + esc(w.label) + "</span></span></button>";
      }).join("");
      weekly = '<div class="card"><h2>Zondagreview</h2><span class="eyebrow">Deze week</span><div class="list">' + auto + manual + "</div></div>";
    }

    return '<div class="view stagger">' + hero + nav + groups + weekly + "</div>";
  }

  function autoRow(label, value, target) {
    var hit = value >= target;
    return '<div class="row locked">' +
      '<span class="box' + (hit ? " on" : "") + '">' + CHECK + "</span>" +
      '<span class="txt"><span' + (hit ? ' style="color:var(--muted)"' : "") + ">" + esc(label) + "</span></span>" +
      '<span class="tag">' + value + " / " + target + "</span>" +
    "</div>";
  }

  /* ============================================================
   * 9. Tab: Training
   * ========================================================== */
  function viewTraining() {
    var prog = PROGRAM[viewDate.getDay()];
    var vKey = key(viewDate);

    if (prog.recovery) {
      var items = prog.recovery.map(function (t) {
        return '<div class="rule"><span class="dot"></span><span>' + esc(t) + "</span></div>";
      }).join("");
      return '<div class="view stagger">' +
        '<div class="card"><h2>' + esc(prog.title) + '</h2><span class="eyebrow">Zondag</span>' + items + "</div>" +
        '<div class="card"><p class="empty">Geen gym vandaag. Wandelen en mobiliteit staan bij je habits, die tellen gewoon door.</p></div>' +
      "</div>";
    }

    var w = workoutFor(viewDate);
    var done = prog.exercises.filter(function (e) { return w[e.id] && w[e.id].done; }).length;
    var total = prog.exercises.length;
    var pct = total ? Math.round((done / total) * 100) : 0;

    var rows = prog.exercises.map(function (e) {
      var entry = w[e.id] || {};
      var on = !!entry.done;
      var prev = lastWeight(e.id, vKey);
      return '<div class="ex' + (on ? " done" : "") + '">' +
        '<button class="ex-check" data-ex="' + e.id + '" aria-pressed="' + on + '" aria-label="' + esc(e.name) + '">' +
          '<span class="box">' + CHECK + "</span>" +
        "</button>" +
        '<div class="ex-body">' +
          '<span class="ex-name">' + esc(e.name) + "</span>" +
          '<span class="hint" style="display:block;font-size:12px;color:var(--muted);margin-top:2px">' +
            esc(e.scheme) + (prev !== null ? " &middot; vorige keer " + nl(prev) + " kg" : " &middot; nog geen gewicht") +
          "</span>" +
        "</div>" +
        '<input class="kg" type="number" inputmode="decimal" step="0.5" min="0" max="500" placeholder="kg" ' +
          'value="' + (typeof entry.kg === "number" ? entry.kg : "") + '" data-kg="' + e.id + '" aria-label="Gewicht">' +
      "</div>";
    }).join("");

    return '<div class="view stagger">' +
      '<div class="card">' +
        "<h2>" + esc(prog.title) + "</h2>" +
        '<span class="eyebrow">' + esc(DAYS[viewDate.getDay()]) + " &middot; " + done + " van " + total + " oefeningen</span>" +
        '<div style="height:6px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-bottom:4px">' +
          '<i style="display:block;height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .8s var(--ease)"></i>' +
        "</div>" +
        (prog.note ? '<p class="empty" style="margin:12px 0 0">' + esc(prog.note) + "</p>" : "") +
        '<div class="list" style="margin-top:12px">' + rows + "</div>" +
      "</div>" +
      '<div class="card"><span class="eyebrow">Progressie</span>' +
        '<p class="empty">Rust 2 tot 3 minuten op compounds, 60 tot 90 seconden op de rest. ' +
        "Ga 2,5 tot 5 kg omhoog zodra alle sets schoon zijn. Houd 1 tot 2 reps in reserve, ga niet naar falen op de grote lifts.</p>" +
      "</div>" +
    "</div>";
  }

  /* ============================================================
   * 10. Tab: Stats
   * ========================================================== */
  function viewStats() {
    var s = stats();

    var tiles =
      '<div class="grid">' +
        tile(s.streak, "Dagen streak", true) +
        tile(s.perfect, "Perfecte dagen") +
        tile(Math.round(s.overall * 100) + "%", "Habits gehaald") +
        tile(s.missed, "Dagen gemist") +
      "</div>";

    // board
    var cells = "";
    var todayKey = key(new Date());
    for (var i = 1; i <= TOTAL_DAYS; i++) {
      var d = addDays(startDate(), i - 1);
      var k = key(d);
      var c = completionFor(d);
      var future = diffDays(new Date(), d) > 0;
      var isT = k === todayKey;
      var perfect = c.total > 0 && c.done === c.total;
      var cls = ["cell"];
      if (future) cls.push("future");
      if (perfect) cls.push("perfect");
      if (!future && !isT && !perfect) cls.push("miss");
      if (isT) cls.push("today");
      cells += '<button class="' + cls.join(" ") + '" data-goto="' + k + '" aria-label="Dag ' + i + '"' + (future ? " disabled" : "") +
        '><i style="height:' + (future || perfect ? 0 : Math.round(c.pct * 100)) + '%"></i></button>';
    }

    var board = '<div class="card"><h2>Het bord</h2><span class="eyebrow">75 dagen &middot; tik om te bewerken</span>' +
      '<div class="board-wrap"><div class="board">' + cells + "</div></div></div>";

    // trend
    var N = 14, W = 100, H = 40, pad = 2, bw = (W - pad * 2) / N, bars = "", labels = "";
    for (var j = 0; j < N; j++) {
      var dd = addDays(new Date(), -(N - 1 - j));
      var ix = dayIndex(dd);
      var cc = (ix >= 1 && ix <= TOTAL_DAYS) ? completionFor(dd) : { pct: 0, done: 0, total: 0 };
      var bh = cc.pct > 0 ? Math.max(cc.pct * (H - 5), 1) : 0;
      var x = pad + j * bw;
      var pf = cc.total > 0 && cc.done === cc.total;
      bars += '<rect class="' + (pf ? "perfect" : "") + '" x="' + (x + bw * 0.16).toFixed(2) + '" y="' + (H - bh).toFixed(2) +
        '" width="' + (bw * 0.68).toFixed(2) + '" height="' + bh.toFixed(2) + '" rx="0.8"></rect>';
      if (j % 3 === 0 || j === N - 1) labels += '<text x="' + (x + bw / 2).toFixed(2) + '" y="' + (H + 6) + '" text-anchor="middle">' + dd.getDate() + "</text>";
    }
    var trend = '<div class="card"><h2>Laatste 14 dagen</h2><span class="eyebrow">Per dag voltooid</span>' +
      '<svg class="trend" viewBox="0 0 100 48" preserveAspectRatio="none">' + bars + labels + "</svg></div>";

    // habit rates
    var rates = "";
    if (s.elapsed >= 1) {
      var sorted = s.rates.slice().sort(function (a, b) { return a.pct - b.pct; });
      var rows = sorted.map(function (r) {
        var p = Math.round(r.pct * 100);
        return '<div class="bar-row"><span class="n">' + esc(r.label) + "</span>" +
          '<span class="b"><i class="' + (p < 70 ? "low" : "") + '" style="width:' + p + '%"></i></span>' +
          '<span class="p">' + p + "%</span></div>";
      }).join("");
      var weak = sorted[0];
      var call = weak.pct < 0.8
        ? '<div class="callout">Zwakste schakel: <b>' + esc(weak.label) + "</b> op " + Math.round(weak.pct * 100) + "%. Daar zit je grootste winst.</div>"
        : '<div class="callout good">Geen zwakke schakel. Laagste habit staat op ' + Math.round(weak.pct * 100) + "%.</div>";
      rates = '<div class="card"><h2>Consistentie</h2><span class="eyebrow">Zwakste eerst</span>' + rows + call + "</div>";
    }

    // records
    var recRows = [];
    allExercises().forEach(function (e) {
      var log = exerciseLog(e.id);
      if (!log.length) return;
      var pr = log[0].kg, best = log[0].kg, lastInc = log[0].date;
      for (var i2 = 1; i2 < log.length; i2++) {
        if (log[i2].kg > best) { best = log[i2].kg; lastInc = log[i2].date; }
        if (log[i2].kg >= pr) pr = log[i2].kg;
      }
      var since = diffDays(parseKey(lastInc), new Date());
      recRows.push({
        name: e.name, pr: pr, last: log[log.length - 1].kg,
        since: since, stale: log.length >= 2 && since >= 21
      });
    });

    var records;
    if (!recRows.length) {
      records = '<div class="card"><h2>Records</h2><span class="eyebrow">Uit je logboek</span>' +
        '<p class="empty">Vul kilo\'s in bij je oefeningen. Daarna zie je hier je PRs en welke lift stilstaat.</p></div>';
    } else {
      recRows.sort(function (a, b) { return (a.stale === b.stale) ? b.since - a.since : (a.stale ? -1 : 1); });
      var rHtml = recRows.map(function (r) {
        return '<div class="rec' + (r.stale ? " stale" : "") + '">' +
          '<span class="n">' + esc(r.name) +
            '<span class="hint">laatst ' + nl(r.last) + " kg &middot; " +
            (r.since === 0 ? "vandaag omhoog" : r.since + " dagen zonder verhoging") + "</span></span>" +
          '<span class="pr">' + nl(r.pr) + "<small> kg</small></span>" +
        "</div>";
      }).join("");
      var stalled = recRows.filter(function (r) { return r.stale; });
      var sc = stalled.length
        ? '<div class="callout">' + stalled.length + " lift" + (stalled.length > 1 ? "s staan" : " staat") +
          " drie weken of langer stil. Check eerst je slaap en je eten voordat je aan het schema sleutelt.</div>"
        : "";
      records = '<div class="card"><h2>Records</h2><span class="eyebrow">Uit je logboek</span>' + rHtml + sc + "</div>";
    }

    // gewicht
    var entries = Object.keys(state.days)
      .filter(function (k) { return typeof state.days[k].weight === "number"; })
      .sort().map(function (k) { return { k: k, v: state.days[k].weight }; });

    var weight;
    if (entries.length >= 2) {
      var vals = entries.map(function (e) { return e.v; });
      var mn = Math.min.apply(null, vals), mx = Math.max.apply(null, vals), span = (mx - mn) || 1;
      var pts = entries.map(function (e, i3) {
        var x = 4 + (i3 / (entries.length - 1)) * 92;
        var y = 5 + (1 - (e.v - mn) / span) * 26;
        return x.toFixed(1) + "," + y.toFixed(1);
      });
      var lastPt = pts[pts.length - 1].split(",");
      var delta = entries[entries.length - 1].v - entries[0].v;
      weight = '<div class="card"><h2>Lichaamsgewicht</h2><span class="eyebrow">' + entries.length + " wegingen &middot; " +
        (delta >= 0 ? "+" : "") + nl(delta) + " kg sinds de start</span>" +
        '<svg class="spark" viewBox="0 0 100 44" preserveAspectRatio="none">' +
          '<polyline points="' + pts.join(" ") + '" vector-effect="non-scaling-stroke"/>' +
          '<circle cx="' + lastPt[0] + '" cy="' + lastPt[1] + '" r="1.6"/>' +
          '<text x="0" y="42">' + nl(mn) + " kg</text>" +
          '<text x="100" y="42" text-anchor="end">' + nl(mx) + " kg</text>" +
        "</svg>" +
        weightForm() + "</div>";
    } else {
      weight = '<div class="card"><h2>Lichaamsgewicht</h2><span class="eyebrow">' + esc(longLabel(viewDate)) + "</span>" +
        '<p class="empty" style="margin-bottom:12px">' +
        (entries.length === 1 ? "Een weging gelogd: " + nl(entries[0].v) + " kg. Voeg een tweede toe voor een trend."
                              : "Weeg jezelf een keer per week, op dezelfde dag en hetzelfde moment.") + "</p>" +
        weightForm() + "</div>";
    }

    return '<div class="view stagger">' + tiles + board + trend + rates + records + weight + "</div>";
  }

  function weightForm() {
    var rec = state.days[key(viewDate)];
    var cur = rec && typeof rec.weight === "number" ? rec.weight : "";
    return '<div style="display:flex;gap:8px;margin-top:8px">' +
      '<input type="number" inputmode="decimal" step="0.1" min="30" max="250" id="w-in" placeholder="kg" value="' + cur + '" aria-label="Gewicht in kg">' +
      '<button class="btn" style="width:auto;padding:0 22px;margin:0" data-act="save-weight">Log</button>' +
    "</div>";
  }

  function tile(v, k, accent) {
    return '<div class="tile"><span class="v' + (accent ? " accent" : "") + '">' + esc(v) + '</span><span class="k">' + esc(k) + "</span></div>";
  }

  /* ============================================================
   * 11. Tab: Info
   * ========================================================== */
  function viewInfo() {
    var rules = RULES.map(function (r) {
      return '<div class="rule"><span class="dot"></span><span>' + esc(r) + "</span></div>";
    }).join("");

    var days = [1, 2, 3, 4, 5, 6, 0].map(function (d) {
      var p = PROGRAM[d];
      var body = p.recovery
        ? p.recovery.join(" &middot; ")
        : p.exercises.map(function (e) { return e.name + " " + e.scheme; }).join(" &middot; ");
      return '<div class="prog-day"><h3>' + esc(DAYS[d].charAt(0).toUpperCase() + DAYS[d].slice(1)) + " &middot; " + esc(p.title) + "</h3><p>" + body + "</p></div>";
    }).join("");

    return '<div class="view stagger">' +
      '<div class="card"><h2>De regels</h2><span class="eyebrow">Sla geen dag over</span>' + rules +
        '<div class="callout good" style="margin-top:16px">Consistentie is belangrijker dan motivatie. Een dag half doen telt niet als perfect, maar is oneindig veel beter dan overslaan.</div>' +
      "</div>" +
      '<div class="card"><h2>Het programma</h2><span class="eyebrow">6 dagen, zondag rust</span>' + days + "</div>" +
      '<div class="card"><h2>Progressieve overload</h2><span class="eyebrow">Hoe je sterker wordt</span>' +
        '<div class="rule"><span class="dot"></span><span>Ga 2,5 tot 5 kg omhoog zodra je alle sets schoon haalt</span></div>' +
        '<div class="rule"><span class="dot"></span><span>Rust 2 tot 3 minuten op squat, bench en deadlift</span></div>' +
        '<div class="rule"><span class="dot"></span><span>Rust 60 tot 90 seconden op accessoires</span></div>' +
        '<div class="rule"><span class="dot"></span><span>Houd 1 tot 2 reps in reserve, ga niet naar falen op de grote lifts</span></div>' +
        '<div class="callout" style="margin-top:16px">Dit schema kent normaal een deload elke 6 tot 8 weken. De challenge staat dat niet toe. Zakt je kracht of je slaap, neem dan een lichte week. Dat is onderhoud, geen falen.</div>' +
      "</div>" +
      '<div class="card"><h2>Je data</h2><span class="eyebrow">Waar staat het</span>' +
        '<p class="empty">Alles staat lokaal in deze browser, op dit apparaat. Er gaat niets naar een server. ' +
        "Maak af en toe een back-up via de instellingen, want een gewiste cache of een nieuwe telefoon betekent anders 75 dagen kwijt.</p>" +
      "</div>" +
    "</div>";
  }

  /* ============================================================
   * 12. Render en events
   * ========================================================== */
  var TABS = [
    { id: "today",    label: "Vandaag",  icon: '<path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>' },
    { id: "training", label: "Training", icon: '<path d="M6.5 6.5v11M17.5 6.5v11M3 9v6M21 9v6M6.5 12h11"/>' },
    { id: "stats",    label: "Stats",    icon: '<path d="M3 3v18h18"/><path d="M7 15l4-6 4 3 5-8"/>' },
    { id: "info",     label: "Info",     icon: '<circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/>' }
  ];

  function renderTabs() {
    document.getElementById("tabs").innerHTML = TABS.map(function (t) {
      return '<button data-tab="' + t.id + '" class="' + (tab === t.id ? "on" : "") + '">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + t.icon + "</svg>" +
        "<span>" + t.label + "</span></button>";
    }).join("");

    document.getElementById("tabs").querySelectorAll("[data-tab]").forEach(function (b) {
      b.addEventListener("click", function () {
        if (tab === b.dataset.tab) return;
        tab = b.dataset.tab;
        sfx.tab();
        render();
        window.scrollTo({ top: 0 });
      });
    });
  }

  function render() {
    var s = stats();

    if (tab === "today") {
      titleEl.textContent = key(viewDate) === key(new Date()) ? "Vandaag" : "Dag " + dayIndex(viewDate);
      subEl.textContent = longLabel(viewDate);
      view.innerHTML = viewToday();
    } else if (tab === "training") {
      titleEl.textContent = "Training";
      subEl.textContent = PROGRAM[viewDate.getDay()].title;
      view.innerHTML = viewTraining();
    } else if (tab === "stats") {
      titleEl.textContent = "Stats";
      subEl.textContent = s.notStarted ? "Nog niet begonnen" : "Dag " + Math.min(TOTAL_DAYS, s.idx) + " van 75";
      view.innerHTML = viewStats();
    } else {
      titleEl.textContent = "Info";
      subEl.textContent = "Regels en programma";
      view.innerHTML = viewInfo();
    }

    renderTabs();
    restTimer.paint();
    bind();
  }

  function markLogged(rec) {
    if (!rec.habits.log) rec.habits.log = true;
  }

  function celebrate(d) {
    var k = key(d);
    if (!state.meta.party) state.meta.party = {};
    if (state.meta.party[k]) return;
    var c = completionFor(d);
    if (c.total > 0 && c.done === c.total) {
      state.meta.party[k] = 1;
      confetti();
      sfx.perfect();
      toast("Perfecte dag");
    }
  }

  function bind() {
    // habits
    view.querySelectorAll("[data-habit]").forEach(function (btn) {
      var h = HABITS.filter(function (x) { return x.id === btn.dataset.habit; })[0];
      if (h && h.auto) return;
      btn.addEventListener("click", function () {
        var rec = dayRecord(key(viewDate));
        var id = btn.dataset.habit;
        if (rec.habits[id]) { delete rec.habits[id]; sfx.untick(); }
        else { rec.habits[id] = true; sfx.tick(); }
        markLogged(rec);
        celebrate(viewDate);
        save();
        render();
      });
    });

    view.querySelectorAll("[data-weekly]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var wk = key(viewDate);
        var id = btn.dataset.weekly;
        if (!state.weeks[wk]) state.weeks[wk] = {};
        if (state.weeks[wk][id]) { delete state.weeks[wk][id]; sfx.untick(); }
        else { state.weeks[wk][id] = true; sfx.tick(); }
        save();
        render();
      });
    });

    // oefeningen
    view.querySelectorAll("[data-ex]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.dataset.ex;
        var rec = dayRecord(key(viewDate));
        if (!rec.workout[id]) rec.workout[id] = {};
        rec.workout[id].done = !rec.workout[id].done;
        if (rec.workout[id].done) sfx.tick(); else sfx.untick();
        if (!rec.workout[id].done && typeof rec.workout[id].kg !== "number") delete rec.workout[id];

        var prog = PROGRAM[viewDate.getDay()];
        if (prog && prog.exercises && !prog.optional) {
          var all = prog.exercises.every(function (e) { return rec.workout[e.id] && rec.workout[e.id].done; });
          if (all && !rec.habits.gym) {
            rec.habits.gym = true;
            sfx.done();
            toast("Gym afgevinkt");
          }
        }
        markLogged(rec);
        celebrate(viewDate);
        restTimer.suggest(id);
        save();
        render();
      });
    });

    view.querySelectorAll("[data-kg]").forEach(function (input) {
      input.addEventListener("change", function () {
        var id = input.dataset.kg;
        var rec = dayRecord(key(viewDate));
        var v = parseFloat(input.value.replace(",", "."));
        if (!rec.workout[id]) rec.workout[id] = {};
        if (isNaN(v)) delete rec.workout[id].kg;
        else {
          var prev = lastWeight(id, key(viewDate));
          rec.workout[id].kg = Math.round(v * 2) / 2;
          if (prev !== null && rec.workout[id].kg > prev) { sfx.done(); toast("Zwaarder dan vorige keer"); }
        }
        markLogged(rec);
        save();
      });
    });

    // dagnavigatie
    view.querySelectorAll("[data-nav]").forEach(function (b) {
      b.addEventListener("click", function () {
        var n = addDays(viewDate, parseInt(b.dataset.nav, 10));
        if (diffDays(new Date(), n) > 0) return;
        viewDate = n;
        sfx.tab();
        render();
      });
    });

    view.querySelectorAll("[data-goto]").forEach(function (b) {
      b.addEventListener("click", function () {
        var d = parseKey(b.dataset.goto);
        if (diffDays(new Date(), d) > 0) return;
        viewDate = d;
        tab = "today";
        sfx.tab();
        render();
        window.scrollTo({ top: 0 });
      });
    });

    // gewicht
    var sw = view.querySelector('[data-act="save-weight"]');
    if (sw) sw.addEventListener("click", function () {
      var input = document.getElementById("w-in");
      var v = parseFloat(input.value.replace(",", "."));
      var rec = dayRecord(key(viewDate));
      if (isNaN(v)) delete rec.weight;
      else { rec.weight = Math.round(v * 10) / 10; sfx.tick(); toast("Gewicht gelogd"); }
      markLogged(rec);
      save();
      render();
    });

    // 3D tilt op de hero, op sleep want iOS vraagt anders om permissie
    var hero = document.getElementById("hero");
    if (hero) tilt(hero);
  }

  function tilt(el) {
    var rect = null;
    function move(e) {
      var t = e.touches ? e.touches[0] : e;
      if (!rect) rect = el.getBoundingClientRect();
      var px = (t.clientX - rect.left) / rect.width;
      var py = (t.clientY - rect.top) / rect.height;
      el.style.transition = "none";
      el.style.transform = "rotateY(" + ((px - 0.5) * 16).toFixed(2) + "deg) rotateX(" + ((0.5 - py) * 12).toFixed(2) + "deg)";
      el.style.setProperty("--gx", (px * 100).toFixed(0) + "%");
      el.style.setProperty("--gy", (py * 100).toFixed(0) + "%");
    }
    function end() {
      rect = null;
      el.style.transition = "";
      el.style.transform = "";
      el.style.setProperty("--gx", "50%");
      el.style.setProperty("--gy", "30%");
    }
    el.addEventListener("touchstart", move, { passive: true });
    el.addEventListener("touchmove", move, { passive: true });
    el.addEventListener("touchend", end);
    el.addEventListener("mousemove", move);
    el.addEventListener("mouseleave", end);
  }

  /* ============================================================
   * 13. Sheets
   * ========================================================== */
  function sheet(html) {
    sheetRoot.innerHTML = '<div class="backdrop"><div class="sheet"><div class="grabber"></div>' + html + "</div></div>";
    sheetRoot.querySelector(".backdrop").addEventListener("click", function (e) {
      if (e.target.classList.contains("backdrop")) closeSheet();
    });
  }
  function closeSheet() { sheetRoot.innerHTML = ""; }

  function openSetup() {
    sheet(
      "<h2>Start de challenge</h2>" +
      "<p>Kies de datum van dag 1 en je huidige gewicht. Beide later aan te passen.</p>" +
      '<div class="field"><label for="s-date">Dag 1</label><input type="date" id="s-date" value="' + key(new Date()) + '"></div>' +
      '<div class="field"><label for="s-weight">Gewicht in kg, optioneel</label><input type="number" inputmode="decimal" step="0.1" id="s-weight" placeholder="78,0"></div>' +
      '<button class="btn" id="begin">Starten</button>'
    );

    document.getElementById("begin").addEventListener("click", function () {
      var d = document.getElementById("s-date").value;
      var w = parseFloat(document.getElementById("s-weight").value.replace(",", "."));
      state = defaultState();
      if (d) state.config.startDate = d;
      if (!isNaN(w)) {
        state.config.bodyweight = w;
        dayRecord(state.config.startDate).weight = Math.round(w * 10) / 10;
      }
      closeSheet();
      sfx.unlock();
      sfx.done();
      save();
      render();
    });
  }

  function openSettings() {
    var soundOn = state.meta.sound !== false;
    sheet(
      "<h2>Instellingen</h2>" +
      "<p>Dag 1 verzetten schuift het hele bord op. Je logs blijven aan hun kalenderdatum hangen.</p>" +
      '<div class="field"><label for="c-date">Dag 1</label><input type="date" id="c-date" value="' + esc(state.config.startDate) + '"></div>' +
      '<div class="field"><label for="c-weight">Gewicht in kg</label><input type="number" inputmode="decimal" step="0.1" id="c-weight" value="' + (state.config.bodyweight || "") + '"></div>' +
      '<div class="switch"><span>Geluid</span><button class="toggle' + (soundOn ? " on" : "") + '" id="snd" aria-pressed="' + soundOn + '"></button></div>' +
      '<button class="btn" id="apply">Opslaan</button>' +
      '<button class="btn ghost" id="exp">Back-up exporteren</button>' +
      '<button class="btn ghost" id="imp">Back-up importeren</button>' +
      '<button class="btn danger" id="rst">Alles wissen</button>' +
      '<input type="file" id="file" accept="application/json" hidden>'
    );

    document.getElementById("snd").addEventListener("click", function () {
      state.meta.sound = state.meta.sound === false;
      this.classList.toggle("on", state.meta.sound !== false);
      if (state.meta.sound !== false) { sfx.unlock(); sfx.tick(); }
      save();
    });

    document.getElementById("apply").addEventListener("click", function () {
      var d = document.getElementById("c-date").value;
      var w = parseFloat(document.getElementById("c-weight").value.replace(",", "."));
      if (d) state.config.startDate = d;
      state.config.bodyweight = isNaN(w) ? null : w;
      closeSheet();
      save();
      render();
      toast("Opgeslagen");
    });

    document.getElementById("exp").addEventListener("click", exportBackup);

    var file = document.getElementById("file");
    document.getElementById("imp").addEventListener("click", function () { file.click(); });
    file.addEventListener("change", function () {
      var f = file.files && file.files[0];
      if (!f) return;
      var r = new FileReader();
      r.onload = function () {
        try {
          var p = JSON.parse(r.result);
          if (!p || !p.config || !p.config.startDate) throw new Error("ongeldig");
          state = p;
          if (!state.days) state.days = {};
          if (!state.weeks) state.weeks = {};
          if (!state.meta) state.meta = {};
          viewDate = new Date();
          closeSheet();
          save();
          render();
          toast("Back-up geladen");
        } catch (e) {
          toast("Bestand niet leesbaar");
        }
      };
      r.readAsText(f);
    });

    var rst = document.getElementById("rst");
    rst.addEventListener("click", function () {
      if (rst.dataset.c !== "1") {
        rst.dataset.c = "1";
        rst.textContent = "Tik nog een keer om te wissen";
        return;
      }
      state = defaultState();
      viewDate = new Date();
      tab = "today";
      closeSheet();
      save();
      render();
      openSetup();
    });
  }

  function exportBackup() {
    try {
      var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "challenge75-" + key(new Date()) + ".json";
      a.click();
      URL.revokeObjectURL(a.href);
      state.meta.lastExport = key(new Date());
      delete state.meta.snooze;
      save();
      toast("Back-up gemaakt");
    } catch (e) {
      toast("Exporteren mislukt");
    }
  }

  document.getElementById("gear").addEventListener("click", function () { sfx.tab(); openSettings(); });

  /* Back-up herinnering */
  function backupNudge() {
    var meta = state.meta || {};
    var since = meta.lastExport ? diffDays(parseKey(meta.lastExport), new Date()) : null;
    if (meta.snooze && diffDays(parseKey(meta.snooze), new Date()) < 7) return;
    if (since === null && elapsedDays() < 7) return;
    if (since !== null && since < 14) return;
    setTimeout(function () {
      toast(since === null ? "Maak een back-up van je data" : "Back-up is " + since + " dagen oud");
      state.meta.snooze = key(new Date());
      save();
    }, 2400);
  }

  /* ============================================================
   * 14. Scroll en boot
   * ========================================================== */
  var topbar = document.getElementById("topbar");
  addEventListener("scroll", function () {
    topbar.classList.toggle("scrolled", window.scrollY > 6);
  }, { passive: true });

  // Geluid mag pas na een echte tik, dat is een regel van iOS
  addEventListener("touchstart", function once() {
    sfx.unlock();
    removeEventListener("touchstart", once);
  }, { passive: true });
  addEventListener("click", function once() {
    sfx.unlock();
    removeEventListener("click", once);
  });

  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) render();
  });

  var stored = load();
  if (stored && stored.config && stored.config.startDate) {
    state = stored;
    if (!state.days) state.days = {};
    if (!state.weeks) state.weeks = {};
    if (!state.meta) state.meta = {};
    render();
    backupNudge();
  } else {
    state = defaultState();
    render();
  }

  var splash = document.getElementById("splash");
  var minSplash = matchMedia("(prefers-reduced-motion: reduce)").matches ? 0 : 900;
  setTimeout(function () {
    splash.classList.add("out");
    setTimeout(function () {
      splash.remove();
      if (!stored || !stored.config) openSetup();
    }, 460);
  }, minSplash);

  if ("serviceWorker" in navigator && location.protocol === "https:") {
    addEventListener("load", function () {
      navigator.serviceWorker.register("/sw.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
